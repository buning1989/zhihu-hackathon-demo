        taskId:
          type: string
        id:
          type: string
        status:
          type: string
          enum:
            - created
            - queued
            - running
            - need_input
            - partial_ready
            - succeeded
            - waiting_retry
            - completed
            - failed
            - cancelled
            - expired
        currentStage:
          type: string
        progress:
          type: integer
          minimum: 0
          maximum: 100
        stages:
          type: array
          items:
