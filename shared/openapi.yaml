        are omitted.
      required:
        - task
        - stages
        - events
        - artifacts
        - summaries
        - cache
        - errorCode
        - errorMessage
        - failedStage
        - totalDurationMs
      properties:
        task:
          type: object
          additionalProperties: true
          required:
            - id
            - status
            - currentStage
            - progress
            - queryPreview
            - queryLength
            - queryHash
            - userIdPresent
            - metadata
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
            status:
              type: string
            currentStage:
              type:
                - string
                - "null"
            progress:
              type: integer
            queryPreview:
              type: string
              description: Truncated query preview, not the full raw request body.
            queryLength:
              type: integer
            queryHash:
              type: string
            userIdPresent:
              type: boolean
            metadata:
              type: object
              additionalProperties: true
              description: Sanitized metadata; secret/token/cookie/authorization/IP-like keys are omitted.
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            startedAt:
              type:
                - string
                - "null"
              format: date-time
            completedAt:
              type:
                - string
                - "null"
              format: date-time
        stages:
          type: array
          items:
            type: object
            additionalProperties: true
        events:
          type: object
          required:
            - count
            - items
          properties:
            count:
              type: integer
            items:
              type: array
              items:
                type: object
                additionalProperties: true
        artifacts:
          type: object
          required:
            - count
            - byType
            - items
          properties:
            count:
              type: integer
            byType:
              type: object
              additionalProperties:
                type: integer
            items:
              type: array
              items:
                type: object
                additionalProperties: true
        summaries:
          type: object
          additionalProperties: true
          properties:
            rawSources:
              type:
                - object
                - "null"
              additionalProperties: true
            candidates:
              type:
                - object
                - "null"
              additionalProperties: true
            evidence:
              type:
                - object
                - "null"
              additionalProperties: true
            productionFinalResult:
              type:
                - object
                - "null"
              additionalProperties: true
        groundingReport:
          type:
            - object
            - "null"
          additionalProperties: true
        cache:
          type: object
          additionalProperties: true
        errorCode:
          type:
            - string
            - "null"
        errorMessage:
          type:
            - string
            - "null"
        failedStage:
          type:
            - string
            - "null"
        totalDurationMs:
          type:
            - integer
            - "null"
    PersistentAgentTaskViewResponse:
      type: object
      required:
        - success
        - data
