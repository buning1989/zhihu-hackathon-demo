      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisStep"
        focusTags:
          type: array
          items:
            type: string
        summary:
          type: string
        openQuestions:
          type: array
          items:
            type: string
    AnalysisStep:
      type: object
      required:
        - title
        - text
      properties:
        title:
          type: string
        text:
          type: string
    DemoPath:
      type: object
      required:
        - id
        - title
        - summary
        - stance
        - evidenceIds
        - sourceRefs
      properties:
        id:
          type: string
        title:
          type: string
          description: Concrete life path title, not an abstract label.
        summary:
          type: string
          description: What this path is, grounded in source content.
        whyRelevant:
          type: string
          description: Why this path relates to the user's original question.
        tradeoff:
          type: string
          description: Cost, risk, limitation, or uncertainty for this path.
        displayLabel:
          type: string
          description: Human-facing path label. Must not expose roughTier, roughScore, diversityKey, contentRole, keepReason, or fallback/debug wording.
        displayTradeoff:
          type: string
          description: Human-facing tradeoff copy safe for direct frontend display.
        fitReason:
          type: string
          description: Optional evidence-aware explanation of why this path may fit the user query/profile context.
        diversityKey:
          type: string
          description: Debug/display hint used to avoid homogeneous paths.
        stance:
          type: string
          enum:
            - experience
            - viewpoint
            - mixed
        personRefs:
          type: array
          items:
            type: string
        evidenceIds:
          type: array
          items:
            type: string
        sourceRefs:
          type: array
          minItems: 1
          items:
            type: string
    DemoPerson:
      type: object
      required:
        - id
        - name
        - pathId
        - role
        - badge
        - avatar
        - oneLine
        - experienceSummary
        - experienceSummarySource
        - experienceSummaryStatus
        - who
        - overlaps
        - timeline
        - lesson
        - articles
        - match
        - aiPersona
      properties:
        id:
          type: string
        name:
          type: string
          description: Display name from public content. Empty values should fall back to 知乎用户.
        pathId:
          type: string
          description: Must reference paths[].id.
        role:
          type: string
        roleLabel:
          type: string
          description: Optional path-representative role label for this public sample.
        badge:
          type: string
        displayTier:
          type: string
          enum:
            - core
            - supplement
          description: core means match.level is high/medium, evidenceQuality >= 0.65, and contentRelevance >= 0.25; otherwise supplement.
        evidenceStatus:
          type: string
          enum:
            - llm_extracted
            - raw_snippet_only
          description: raw_snippet_only means frontend should show 来源片段 rather than AI 证据提炼.
        canChat:
          type: boolean
          description: Whether the frontend may show a persona follow-up entry. False should degrade to 查看来源片段.
        displayLabel:
          type: string
          example: 补充参考样本
        displayTradeoff:
          type: string
          description: User-facing limitation or downgrade copy for this sample.
        avatar:
          type: string
        oneLine:
          type: string
        experienceSummary:
          type:
            - string
            - "null"
          description: >
            LLM-generated summary of the author's/sample's situation, choice,
            cost/turning point/result, and relevance to the current query. Null
            when the LLM did not produce a grounded experience-style summary.
        experienceSummarySource:
          type: string
          enum:
            - llm
            - fallback
            - none
          description: Main display should use llm only; fallback/none must not be shown as primary summary.
        experienceSummaryStatus:
          type: string
          enum:
            - ready
            - pending
            - failed
          description: Frontend should display experienceSummary only when status is ready and source is llm.
        experienceSummaryConfidence:
          type: number
          minimum: 0
          maximum: 1
          description: Optional confidence score for LLM-generated experienceSummary.
        matchedPathTitle:
          type: string
          description: The path this person represents.
        relevanceReason:
          type: string
          description: Why this sample is relevant under the user's question.
        fitReason:
          type: string
          description: Optional evidence-aware explanation; user context is not a grounding source.
        who:
          type: string
          description: Description based on public content, not a complete biography.
        overlaps:
          type: array
          items:
            type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineItem"
        lesson:
          type: string
        articles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PersonArticle"
        match:
          $ref: "#/components/schemas/PersonMatch"
        aiPersona:
          $ref: "#/components/schemas/AiPersona"
    TimelineItem:
      type: object
      required:
        - date
        - event
      properties:
        date:
          type: string
        event:
          type: string
    PersonArticle:
      type: object
      required:
