openapi: 3.1.0
info:
  title: Zhihu Hackathon Demo API
  version: 0.1.1
  description: >
    Shared contract for the current monorepo scaffold. The frontend should
    treat GET /api/search as the current P0 main interface. Paths marked with
    x-implementation-status: planned are future contracts and are not available
    in the backend yet.
servers:
  - url: http://localhost:8000
    description: Local backend
tags:
  - name: Health
    description: Implemented health checks.
  - name: Auth
    description: Implemented Zhihu OAuth login and session endpoints.
  - name: Search
    description: Implemented search endpoints.
  - name: Zhihu
    description: Implemented raw Zhihu proxy endpoints.
  - name: Planned
    description: Future demo endpoints, not implemented in the backend yet.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Root health check
      description: Implemented. Used by smoke tests and local demo checks.
      operationId: getRootHealth
      x-implementation-status: implemented
      responses:
        "200":
          description: Backend is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootHealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    service: zhihu-hackathon-backend
                    version: 0.1.0
  /api/health:
    get:
      tags:
        - Health
      summary: API health check
      description: Implemented. Keeps the existing wrapped API response shape.
      operationId: getApiHealth
      x-implementation-status: implemented
      responses:
        "200":
          description: Backend API is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiHealthResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      status: ok
                      service: zhihu-hackathon-backend
  /auth/zhihu/login:
    get:
      tags:
        - Auth
      summary: Start Zhihu OAuth login
      description: >
        Implemented. Creates a short-lived OAuth state, stores it in an
        HttpOnly cookie and server memory, then redirects the browser to
        Zhihu's authorization endpoint. ZHIHU_APP_ID and ZHIHU_APP_KEY are
        required only when this endpoint is called, so the server can still
        start without local OAuth credentials.
      operationId: loginWithZhihu
      x-implementation-status: implemented
      responses:
        "302":
          description: Redirects to Zhihu authorization page.
          headers:
            Location:
              schema:
                type: string
              description: Zhihu authorization URL.
        "500":
          description: Missing local Zhihu OAuth credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingOAuthConfig:
                  value:
                    success: false
                    error:
                      code: ZHIHU_OAUTH_NOT_CONFIGURED
                      message: 知乎 OAuth 未配置：ZHIHU_APP_ID, ZHIHU_APP_KEY
  /auth/zhihu/callback:
    get:
      tags:
        - Auth
      summary: Finish Zhihu OAuth callback
      description: >
        Implemented. Validates OAuth state, exchanges the authorization code
        for an access token on the backend, optionally loads user info from
        ZHIHU_USERINFO_PATH, creates an in-memory app session, sets an HttpOnly
        session cookie, and redirects to FRONTEND_URL.
      operationId: zhihuOAuthCallback
      x-implementation-status: implemented
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Login succeeded and browser is redirected to the frontend.
          headers:
            Location:
              schema:
                type: string
              description: Configured FRONTEND_URL.
        "400":
          description: Missing code/state or failed state validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Zhihu OAuth token or configured user-info request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current login session
      description: >
        Implemented. Reads the HttpOnly session cookie and returns the current
        app session user data. Access tokens are never included in this
        response. If ZHIHU_USERINFO_PATH was not configured during login,
        userInfoLoaded is false and the user is a temporary demo user.
      operationId: getCurrentAuthSession
      x-implementation-status: implemented
      responses:
        "200":
          description: Current session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
              examples:
                temporary:
                  value:
                    success: true
                    data:
                      provider: zhihu
                      userInfoLoaded: false
                      user:
                        id: zhihu-temp-example
                        provider: zhihu
                        displayName: 知乎临时用户
                        avatar: ""
                        headline: ""
                        isTemporary: true
                        userInfoLoaded: false
                      session:
                        createdAt: "2026-05-13T00:00:00.000Z"
                        expiresAt: "2026-05-20T00:00:00.000Z"
        "401":
          description: Missing or expired session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Clear current login session
      description: Implemented. Deletes the in-memory session and clears the HttpOnly cookie.
      operationId: logout
      x-implementation-status: implemented
      responses:
        "200":
          description: Logout succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      loggedOut: true
  /api/search:
    get:
      tags:
        - Search
      summary: Frontend-friendly search endpoint
      description: >
        Implemented. This is the current P0 main interface for frontend
        integration. Without a real Zhihu key, the endpoint returns a clear
        JSON error instead of crashing.
      operationId: getSearch
      x-implementation-status: implemented
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          example: 不工作了能去哪儿
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          example: 1
      responses:
        "200":
          description: Search succeeded and was mapped into frontend-friendly fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchSuccessResponse"
              examples:
                success:
                  value:
                    success: true
                    data:
                      query: 不工作了能去哪儿
                      count: 1
                      hasMore: false
                      searchHashId: ""
                      items:
                        - id: zhihu_item_1
                          type: answer
                          title: 裸辞以后可以去哪里
                          text: 一段来自知乎内容或 mock 内容的摘要。
                          url: https://www.zhihu.com/question/mock/answer/mock
                          author:
                            name: 知乎作者
                            avatar: ""
                            badge: ""
                            badgeText: ""
                          stats:
                            commentCount: 0
                            voteUpCount: 0
                            rankingScore: 0
                          comments: []
                          editTime: 0
                          authorityLevel: ""
                          source:
                            provider: zhihu
                            url: https://www.zhihu.com/question/mock/answer/mock
                          evidence:
                            text: 一段来自知乎内容或 mock 内容的摘要。
                            source:
                              provider: zhihu
                              url: https://www.zhihu.com/question/mock/answer/mock
        "400":
          description: Missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Missing local Zhihu credentials or other backend error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingKey:
                  value:
                    success: false
                    error:
                      code: ZHIHU_AUTH_FAILED
                      message: 知乎 API 鉴权失败
  /api/zhihu/search:
    get:
      tags:
        - Zhihu
      summary: Raw Zhihu search proxy
      description: >
        Implemented. This endpoint is mainly for backend debugging because it
        returns the raw upstream Zhihu response when credentials are configured.
        Frontend should prefer GET /api/search.
      operationId: getZhihuSearchRaw
      x-implementation-status: implemented
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          example: 不工作了能去哪儿
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          example: 1
      responses:
        "200":
          description: Raw Zhihu response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZhihuRawSearchResponse"
              examples:
                raw:
                  value:
                    Code: 200
                    Message: OK
                    Data:
                      HasMore: false
                      SearchHashId: ""
                      Items: []
        "400":
          description: Missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Missing local Zhihu credentials or other backend error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingKey:
                  value:
                    success: false
                    error:
                      code: ZHIHU_AUTH_FAILED
                      message: 知乎 API 鉴权失败
  /api/demo/search:
    post:
      tags:
        - Planned
      summary: "[planned] Create a demo search session"
      description: >
        Planned/future endpoint. It is kept here to show the intended richer
        demo contract, but it is not implemented in the current backend.
        Frontend should not call this endpoint for P0 integration.
      operationId: createDemoSearch
      x-implementation-status: planned
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoSearchRequest"
            examples:
              default:
                value:
                  query: 不工作了能去哪儿？
                  sessionId: s_demo_001
                  mode: mock
      responses:
        "501":
          description: Planned endpoint, not implemented yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                planned:
                  value:
                    success: false
                    error:
                      code: NOT_IMPLEMENTED
                      message: Planned endpoint, not implemented yet.
  /api/demo/session/{sessionId}:
    get:
      tags:
        - Planned
      summary: "[planned] Fetch a demo session by id"
      description: >
        Planned/future endpoint. It is not implemented in the current backend.
        Frontend should not call this endpoint for P0 integration.
      operationId: getDemoSession
      x-implementation-status: planned
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
          example: s_demo_001
      responses:
        "501":
          description: Planned endpoint, not implemented yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                planned:
                  value:
                    success: false
                    error:
                      code: NOT_IMPLEMENTED
                      message: Planned endpoint, not implemented yet.
components:
  schemas:
    RootHealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - zhihu-hackathon-backend
        version:
          type: string
    ApiHealthResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - status
            - service
          properties:
            status:
              type: string
              enum:
                - ok
            service:
              type: string
              enum:
                - zhihu-hackathon-backend
    AuthMeResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/AuthSessionData"
    AuthSessionData:
      type: object
      required:
        - provider
        - userInfoLoaded
        - user
        - session
      properties:
        provider:
          type: string
          enum:
            - zhihu
        userInfoLoaded:
          type: boolean
          description: False when ZHIHU_USERINFO_PATH was not configured during login.
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          type: object
          required:
            - createdAt
            - expiresAt
          properties:
            createdAt:
              type: string
              format: date-time
            expiresAt:
              type: string
              format: date-time
    AuthUser:
      type: object
      required:
        - id
        - provider
        - displayName
        - avatar
        - headline
        - isTemporary
        - userInfoLoaded
      properties:
        id:
          type: string
        provider:
          type: string
          enum:
            - zhihu
        displayName:
          type: string
        avatar:
          type: string
        headline:
          type: string
        isTemporary:
          type: boolean
        userInfoLoaded:
          type: boolean
    LogoutResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - loggedOut
          properties:
            loggedOut:
              type: boolean
              const: true
    SearchSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/SearchResult"
    SearchResult:
      type: object
      required:
        - query
        - count
        - hasMore
        - searchHashId
        - items
      properties:
        query:
          type: string
          description: Trimmed user query.
        count:
          type: integer
          description: Server-normalized requested result count.
        hasMore:
          type: boolean
          description: Whether upstream reports more results.
        searchHashId:
          type: string
          description: Upstream search cursor/hash. Can be an empty string.
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchItem"
    SearchItem:
      type: object
      required:
        - id
        - type
        - title
        - text
        - url
        - author
        - stats
        - comments
        - editTime
        - authorityLevel
        - source
        - evidence
      properties:
        id:
          type: string
        type:
          type: string
          description: Upstream content type. Can be an empty string.
        title:
          type: string
          description: Content title. Can be an empty string.
        text:
          type: string
          description: Main content text or excerpt. Can be an empty string.
        url:
          type: string
          description: Original Zhihu URL. Can be an empty string if upstream omits it.
        author:
          $ref: "#/components/schemas/SearchAuthor"
        stats:
          $ref: "#/components/schemas/SearchStats"
        comments:
          type: array
          items: {}
          description: Raw comments array when provided by upstream. Usually empty for P0.
        editTime:
          type: number
          description: Upstream edit timestamp. 0 when missing.
        authorityLevel:
          type: string
          description: Upstream authority level. Can be an empty string.
        source:
          $ref: "#/components/schemas/SearchSource"
        evidence:
          $ref: "#/components/schemas/SearchEvidence"
    SearchAuthor:
      type: object
      required:
        - name
        - avatar
        - badge
        - badgeText
      properties:
        name:
          type: string
          description: Author display name. Can be an empty string.
        avatar:
          type: string
          description: Author avatar URL. Can be an empty string.
        badge:
          type: string
          description: Raw author badge. Can be an empty string.
        badgeText:
          type: string
          description: Human-readable author badge. Can be an empty string.
    SearchStats:
      type: object
      required:
        - commentCount
        - voteUpCount
        - rankingScore
      properties:
        commentCount:
          type: number
        voteUpCount:
          type: number
        rankingScore:
          type: number
    SearchSource:
      type: object
      required:
        - provider
        - url
      properties:
        provider:
          type: string
          enum:
            - zhihu
        url:
          type: string
          description: Original content URL. Can be an empty string for malformed upstream data.
    SearchEvidence:
      type: object
      required:
        - text
        - source
      properties:
        text:
          type: string
          description: Evidence text derived from the original content. Can be empty in P0 errors or incomplete upstream data.
        source:
          $ref: "#/components/schemas/SearchSource"
    ZhihuRawSearchResponse:
      type: object
      additionalProperties: true
      properties:
        Code:
          oneOf:
            - type: integer
            - type: string
        Message:
          type: string
        Data:
          description: Raw upstream payload.
    ApiErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    DemoSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
        sessionId:
          type: string
          description: Optional client-provided session id.
        mode:
          type: string
          enum:
            - mock
            - cache_first
            - real
          default: mock
    DemoSearchResponse:
      type: object
      required:
        - schemaVersion
        - sessionId
        - query
        - sections
        - meta
      properties:
        schemaVersion:
          type: string
          example: "0.1"
        sessionId:
          type: string
        query:
          $ref: "#/components/schemas/QueryView"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/DemoSection"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    DemoSessionResponse:
      allOf:
        - $ref: "#/components/schemas/DemoSearchResponse"
        - type: object
          properties:
            status:
              type: string
              enum:
                - active
                - expired
    QueryView:
      type: object
      required:
        - raw
        - display
      properties:
        raw:
          type: string
        display:
          type: string
    DemoSection:
      type: object
      required:
        - id
        - title
        - cards
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        cards:
          type: array
          items:
            $ref: "#/components/schemas/DemoCard"
    DemoCard:
      type: object
      required:
        - id
        - type
        - title
        - summary
        - evidence
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - person
            - content
            - path
            - build_prompt
        title:
          type: string
        summary:
          type: string
        tags:
          type: array
          items:
            type: string
        evidence:
          $ref: "#/components/schemas/SearchEvidence"
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/Block"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Action"
    Block:
      type: object
      required:
        - type
        - content
      properties:
        type:
          type: string
          enum:
            - paragraph
            - quote
            - list
            - callout
        content:
          type: string
        source:
          $ref: "#/components/schemas/SearchSource"
    Action:
      type: object
      required:
        - type
        - label
      properties:
        type:
          type: string
          enum:
            - open_url
            - view_detail
            - ask_followup
        label:
          type: string
        url:
          type: string
        targetId:
          type: string
    ResponseMeta:
      type: object
      required:
        - mode
        - generatedAt
      properties:
        mode:
          type: string
        generatedAt:
          type: string
          format: date-time
        traceId:
          type: string
