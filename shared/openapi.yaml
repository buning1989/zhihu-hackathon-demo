              type: string
            message:
              type: string
    DemoSearchSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          oneOf:
            - $ref: "#/components/schemas/DemoSearchResponse"
            - $ref: "#/components/schemas/DemoIntentSearchPlanResponse"
    DemoSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          description: Raw user question.
        count:
          type: integer
          minimum: 1
          maximum: 20
          default: 20
          description: Desired recall count before product-layer grouping.
        mode:
          type: string
          enum:
            - mock
            - cache_first
            - real
          default: mock
          description: Data mode. P0 must work in mock mode without Zhihu or LLM keys.
        dataMode:
          type: string
          enum:
            - mock
            - cache_first
            - real
          default: mock
          description: Data mode used by the implemented backend. mode remains a compatibility alias.
        clarificationAnswers:
          type: object
          additionalProperties:
            type: string
          description: >
            Non-empty clarification-card answers. When present, /api/demo/search
            returns intent/searchPlan only and does not enter the full
            paths/people/personas result generation chain.
        sessionId:
          type: string
          description: Optional client-provided session id for local demo continuity.
    DemoIntentSearchPlanResponse:
      type: object
      required:
        - intent
        - intentSummary
        - focusTags
        - searchPlan
        - debug
      properties:
        intent:
          type: string
          description: Compact snake_case intent category.
          example: relationship_career_tradeoff
        intentSummary:
          type: string
          description: One-sentence understanding of the user's clarified need.
        focusTags:
          type: array
          minItems: 3
          items:
            type: string
        searchPlan:
          $ref: "#/components/schemas/DemoIntentSearchPlan"
        contextUsed:
          $ref: "#/components/schemas/DemoContextUsed"
        debug:
          $ref: "#/components/schemas/DemoIntentSearchPlanDebug"
    DemoIntentSearchPlan:
      type: object
      required:
        - coreQueries
        - expandedQueries
        - exploratoryQueries
        - rankingSignals
        - negativeHints
        - expectedEvidenceTypes
      properties:
        coreQueries:
          type: array
          minItems: 3
          description: Short keyword queries for primary Zhihu recall.
          items:
            type: string
        expandedQueries:
          type: array
          minItems: 2
          description: Slightly more specific supplemental recall queries.
          items:
            type: string
        exploratoryQueries:
          type: array
          minItems: 1
          description: Small number of long-tail exploratory queries.
          items:
            type: string
        rankingSignals:
          type: array
          minItems: 3
          description: Complex intent signals reserved for later filtering and ranking.
          items:
            type: string
        negativeHints:
          type: array
          items:
            type: string
        expectedEvidenceTypes:
          type: array
          items:
            type: string
    DemoIntentSearchPlanDebug:
      type: object
      required:
        - stage
        - llmUsed
        - provider
        - model
        - clarificationAnswerKeys
        - latencyMs
        - notes
      properties:
        stage:
          type: string
          const: intent_expand
        llmUsed:
          type: boolean
        provider:
          type: string
        model:
          type: string
        fallbackReason:
          type: string
        clarificationAnswerKeys:
          type: array
          items:
            type: string
        latencyMs:
          type: integer
          minimum: 0
        objectiveSlots:
          $ref: "#/components/schemas/DemoObjectiveSlots"
        missingSlots:
          type: array
          items:
            $ref: "#/components/schemas/DemoObjectiveSlotName"
        queryPlan:
          $ref: "#/components/schemas/DemoObjectiveQueryPlan"
        notes:
          type: array
          items:
            type: string
    DemoSearchResponse:
      type: object
      required:
        - schemaVersion
        - queryId
        - query
        - dataMode
        - features
        - analysis
        - paths
        - people
        - meta
      properties:
        schemaVersion:
          type: string
          example: "2026-05-13.ai-persona-v1"
        queryId:
          type: string
          description: Stable id that links search, save and persona chat flows.
        query:
          type: string
        dataMode:
          type: string
          enum:
            - mock
            - cache_first
            - real
        contextUsed:
          $ref: "#/components/schemas/DemoContextUsed"
        features:
          $ref: "#/components/schemas/DemoFeatures"
        analysis:
          $ref: "#/components/schemas/DemoAnalysis"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/DemoPath"
        people:
          type: array
          description: Primary person/sample data. AI personas hang under each person.
          items:
            $ref: "#/components/schemas/DemoPerson"
        personas:
          type: array
          description: Optional shortcut index only. Do not duplicate complete person data here. If absent, derive entries from people[].aiPersona.
          items:
            $ref: "#/components/schemas/PersonaIndex"
        sections:
          type: array
          description: Optional weak layout grouping. If absent, render from analysis, paths, people and derived personas in the default order.
          items:
            $ref: "#/components/schemas/DemoSection"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        debug:
          $ref: "#/components/schemas/DemoDebug"
        clarifyingCard:
          $ref: "#/components/schemas/DemoClarifyingCard"
        clarificationStage:
          $ref: "#/components/schemas/DemoClarificationStage"
    DemoContextUsed:
      type: object
      description: >
        Optional debug-safe summary of whether lightweight Zhihu OAuth profile
        context influenced intent expansion, query expansion or fit reasons.
        It must not expose tokens, cookies, raw userInfo, full profile objects
        or grounding evidence.
      required:
        - provider
        - loggedIn
        - zhihuProfileUsed
        - profileSignals
        - usedFor
      properties:
        provider:
          type: string
          enum:
            - zhihu
        loggedIn:
          type: boolean
        zhihuProfileUsed:
          type: boolean
          description: True only when non-sensitive profileSignals were actually used.
        profileSignals:
          type: array
          description: Non-sensitive occupation/interest terms extracted from basic profile fields.
          items:
            type: string
        usedFor:
          type: array
    DemoClarifyingCard:
