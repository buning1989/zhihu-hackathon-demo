        - status
        - frontendStatus
        - progressPercent
        - pollAfterMs
        - partialAvailable
        - resultAvailable
        - needInput
        - stages
        - degraded
        - error
      properties:
        taskId:
          type: string
        status:
          type: string
          enum:
            - created
            - queued
            - running
            - need_input
            - partial_ready
            - succeeded
            - failed
            - cancelled
            - expired
        frontendStatus:
          type: string
        progressPercent:
          type: integer
