            - string
            - "null"
          format: date-time
        latencyMs:
          type:
            - integer
            - "null"
        errorCode:
          type:
            - string
            - "null"
        errorMessage:
          type:
            - string
            - "null"
        outputRef:
          type:
            - string
            - "null"
    ProductionAgentFinalResult:
