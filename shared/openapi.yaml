openapi: 3.1.0
info:
  title: Zhihu Hackathon Demo API
  version: 0.2.0
  description: >
    Shared contract for the current monorepo scaffold. GET /api/search remains
    the implemented search mapping endpoint and must not be broken. The P0
    product-layer contract for the AI persona experience is POST
    /api/demo/search; persona chat is planned for P0.5 at POST
    /api/personas/chat.
servers:
  - url: http://localhost:8000
    description: Local backend
tags:
  - name: Health
    description: Implemented health checks.
  - name: Auth
    description: Implemented Zhihu OAuth login and session endpoints.
  - name: Search
    description: Implemented search endpoints.
  - name: Zhihu
    description: Implemented raw Zhihu proxy endpoints.
  - name: Demo
    description: Product-layer demo contracts for analysis, paths, people and AI personas.
  - name: Agent
    description: Agent task APIs, including the legacy in-memory wrapper and the persistent Postgres task skeleton.
  - name: Personas
    description: AI persona chat contracts grounded in public content evidence.
  - name: Planned
    description: Future demo endpoints, not implemented in the backend yet.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Root health check
      description: Implemented. Used by smoke tests and local demo checks.
      operationId: getRootHealth
      x-implementation-status: implemented
      responses:
        "200":
          description: Backend is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootHealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    service: zhihu-hackathon-backend
                    version: 0.1.0
  /api/health:
    get:
      tags:
        - Health
      summary: API health check
      description: Implemented. Keeps the existing wrapped API response shape.
      operationId: getApiHealth
      x-implementation-status: implemented
      responses:
        "200":
          description: Backend API is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiHealthResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      status: ok
                      service: zhihu-hackathon-backend
  /auth/zhihu/login:
    get:
      tags:
        - Auth
      summary: Start Zhihu OAuth login
      description: >
        Implemented. Creates a short-lived OAuth state, stores it in an
        HttpOnly cookie and server memory, then redirects the browser to
        Zhihu's authorization endpoint. ZHIHU_APP_ID and ZHIHU_APP_KEY are
        required only when this endpoint is called, so the server can still
        start without local OAuth credentials.
      operationId: loginWithZhihu
      x-implementation-status: implemented
      responses:
        "302":
          description: Redirects to Zhihu authorization page.
          headers:
            Location:
              schema:
                type: string
              description: Zhihu authorization URL.
        "500":
          description: Missing local Zhihu OAuth credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingOAuthConfig:
                  value:
                    success: false
                    error:
                      code: ZHIHU_OAUTH_NOT_CONFIGURED
                      message: 知乎 OAuth 未配置：ZHIHU_APP_ID, ZHIHU_APP_KEY
  /auth/zhihu/callback:
    get:
      tags:
        - Auth
      summary: Finish Zhihu OAuth callback
      description: >
        Implemented. Validates OAuth state, exchanges the authorization code
        for an access token on the backend, optionally loads user info from
        ZHIHU_USERINFO_PATH, creates an in-memory app session, sets an HttpOnly
        session cookie, and redirects to FRONTEND_URL.
      operationId: zhihuOAuthCallback
      x-implementation-status: implemented
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Login succeeded and browser is redirected to the frontend.
          headers:
            Location:
              schema:
                type: string
              description: Configured FRONTEND_URL.
        "400":
          description: Missing code/state or failed state validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Zhihu OAuth token or configured user-info request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current login session
      description: >
        Implemented. Reads the HttpOnly session cookie and returns the current
        app session user data. Access tokens are never included in this
        response. If ZHIHU_USERINFO_PATH was not configured during login,
        userInfoLoaded is false and the user is a temporary demo user.
      operationId: getCurrentAuthSession
      x-implementation-status: implemented
      responses:
        "200":
          description: Current session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
              examples:
                temporary:
                  value:
                    success: true
                    data:
                      id: zhihu-temp-example
                      name: 知乎临时用户
                      avatar: ""
                      profileUrl: ""
                      provider: zhihu
                      userInfoLoaded: false
                      user:
                        id: zhihu-temp-example
                        provider: zhihu
                        displayName: 知乎临时用户
                        avatar: ""
                        profileUrl: ""
                        headline: ""
                        isTemporary: true
                        userInfoLoaded: false
                      session:
                        createdAt: "2026-05-13T00:00:00.000Z"
                        expiresAt: "2026-05-20T00:00:00.000Z"
        "401":
          description: Missing or expired session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Clear current login session
      description: Implemented. Deletes the in-memory session and clears the HttpOnly cookie.
      operationId: logout
      x-implementation-status: implemented
      responses:
        "200":
          description: Logout succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      loggedOut: true
  /api/search:
    get:
      tags:
        - Search
      summary: Frontend-friendly search endpoint
      description: >
        Implemented. This is the existing frontend-friendly Zhihu search
        mapping endpoint and remains available for compatibility, debugging
        and product-layer recall. The P0 AI persona product contract is POST
        /api/demo/search. Without a real Zhihu key, this endpoint returns a
        clear JSON error instead of crashing.
      operationId: getSearch
      x-implementation-status: implemented
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          example: 不工作了能去哪儿
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          example: 1
      responses:
        "200":
          description: Search succeeded and was mapped into frontend-friendly fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchSuccessResponse"
              examples:
                success:
                  value:
                    success: true
                    data:
                      query: 不工作了能去哪儿
                      count: 1
                      hasMore: false
                      searchHashId: ""
                      items:
                        - id: zhihu_item_1
                          type: answer
                          title: 裸辞以后可以去哪里
                          text: 一段来自知乎内容或 mock 内容的摘要。
                          url: https://www.zhihu.com/question/mock/answer/mock
                          author:
                            name: 知乎作者
                            avatar: ""
                            badge: ""
                            badgeText: ""
                          stats:
                            commentCount: 0
                            voteUpCount: 0
                            rankingScore: 0
                          comments: []
                          editTime: 0
                          authorityLevel: ""
                          source:
                            provider: zhihu
                            url: https://www.zhihu.com/question/mock/answer/mock
                          evidence:
                            text: 一段来自知乎内容或 mock 内容的摘要。
                            source:
                              provider: zhihu
                              url: https://www.zhihu.com/question/mock/answer/mock
        "400":
          description: Missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Missing local Zhihu credentials or other backend error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingKey:
                  value:
                    success: false
                    error:
                      code: ZHIHU_AUTH_FAILED
                      message: 知乎 API 鉴权失败
  /api/zhihu/search:
    get:
      tags:
        - Zhihu
      summary: Raw Zhihu search proxy
      description: >
        Implemented. This endpoint is mainly for backend debugging because it
        returns the raw upstream Zhihu response when credentials are configured.
        Frontend should prefer GET /api/search.
      operationId: getZhihuSearchRaw
      x-implementation-status: implemented
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          example: 不工作了能去哪儿
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          example: 1
      responses:
        "200":
          description: Raw Zhihu response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZhihuRawSearchResponse"
              examples:
                raw:
                  value:
                    Code: 200
                    Message: OK
                    Data:
                      HasMore: false
                      SearchHashId: ""
                      Items: []
        "400":
          description: Missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Missing local Zhihu credentials or other backend error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingKey:
                  value:
                    success: false
                    error:
                      code: ZHIHU_AUTH_FAILED
                      message: 知乎 API 鉴权失败
  /api/zhihu/ring/publish:
    post:
      tags:
        - Zhihu
      summary: Publish a pin to an allowlisted Zhihu ring
      description: >
        Implemented. Manual-only endpoint that publishes a pin to one of the
        backend allowlisted Zhihu rings through POST /openapi/publish/pin. It
        is not called by the demo search flow. The backend enforces a
        per-process limit of 5 real publish attempts per hour.
      operationId: publishZhihuRingPin
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ZhihuRingPublishRequest"
            examples:
              default:
                value:
                  ringId: "2029619126742656657"
                  title: 错位人生测试
                  content: 这是一条后端链路测试内容，请忽略。
                  imageUrls: []
      responses:
        "200":
          description: Pin publish succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZhihuRingPublishSuccessResponse"
              examples:
                success:
                  value:
                    success: true
                    data:
                      contentToken: "1992012205256892542"
                    meta:
                      ringId: "2029619126742656657"
                      logId: "0b624840-ae8f-4df6-af07-cd331c210e84"
        "400":
          description: Missing required field, invalid imageUrls, or non-allowlisted ringId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                ringNotAllowed:
                  value:
                    success: false
                    error:
                      code: ZHIHU_RING_NOT_ALLOWED
                      message: 圈子 ID 不在允许发布的白名单内
        "429":
          description: Local per-process publish limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                rateLimited:
                  value:
                    success: false
                    error:
                      code: ZHIHU_RING_PUBLISH_RATE_LIMITED
                      message: 本地进程内圈子发布限流：同一小时最多 5 次真实发布
        "500":
          description: Missing local Zhihu OpenAPI publish credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingConfig:
                  value:
                    success: false
                    error:
                      code: ZHIHU_RING_PUBLISH_CONFIG_ERROR
                      message: 知乎圈子发布 OpenAPI 配置缺失：ZHIHU_OPENAPI_APP_KEY, ZHIHU_OPENAPI_APP_SECRET
        "502":
          description: Upstream Zhihu publish failure or malformed upstream response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                upstreamFailed:
                  value:
                    success: false
                    error:
                      code: ZHIHU_RING_PUBLISH_FAILED
                      message: 知乎返回的失败信息
  /api/demo/search:
    post:
      tags:
        - Demo
      summary: Create an AI-persona-ready demo search result
      description: >
        P0 product-layer target contract for the frontend AI persona
        experience. It wraps search results into analysis, paths, people,
        persona indexes, sections and metadata. The existing GET /api/search
        contract remains implemented and must not be broken. During P0
        implementation, this endpoint must run with mock/stub data when Zhihu
        API keys or LLM keys are missing.
      operationId: createDemoSearch
      x-implementation-status: planned-p0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoSearchRequest"
            examples:
              default:
                value:
                  query: 不工作了之后，我想去新西兰生活
                  count: 20
                  mode: mock
      responses:
        "200":
          description: Product-layer search response with AI persona entry points.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoSearchResponse"
              examples:
                aiPersona:
                  value:
                    schemaVersion: "2026-05-13.ai-persona-v1"
                    queryId: query_demo_001
                    query: 不工作了之后，我想去新西兰生活
                    dataMode: mock
                    contextUsed:
                      provider: zhihu
                      loggedIn: false
                      zhihuProfileUsed: false
                      profileSignals: []
                      usedFor: []
                    features:
                      aiPersona: true
                      personaChat: mock
                      saveSample: false
                      articleBody: false
                      sourceEvidenceRequired: true
                    analysis:
                      steps:
                        - title: 读取问题
                          text: 不工作了之后，我想去新西兰生活
                      focusTags:
                        - 暂停工作
                        - 新西兰
                    paths: []
                    people: []
                    personas: []
                    sections: []
                    meta:
                      mode: mock
                      generatedAt: "2026-05-13T00:00:00.000Z"
                    debug:
                      stubbed: true
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Backend error. P0 implementation should prefer mock/stub fallback when keys are missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/agent/search:
    post:
      tags:
        - Agent
      summary: Start a lightweight demo search agent task
      description: >
        Creates an in-memory task, starts the existing demo search pipeline in
        the background, and returns immediately with a taskId. The final result
        keeps the existing demo.v1 response shape used by /api/demo/search.
      operationId: startDemoSearchAgent
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoSearchRequest"
      responses:
        "200":
          description: Agent task accepted and running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTaskStartResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/agent/tasks:
    get:
      tags:
        - Agent
      summary: List recent persistent Agent tasks
      description: >
        Read-only debug helper for the internal Agent Runtime debug page.
        Returns recent Postgres-backed Agent tasks ordered by createdAt
        descending. Does not include artifacts or events; use
        /api/agent/tasks/{taskId} for the full snapshot.
      operationId: listPersistentAgentTasks
      x-implementation-status: implemented-debug
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Recent persistent Agent tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistentAgentTaskListResponse"
        "503":
          description: DATABASE_URL is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      tags:
        - Agent
      summary: Create a persistent Agent task
      description: >
        Persistent Agent Runtime. Creates a task in Postgres, writes
        task.created, enqueues a BullMQ job, marks it queued, and writes
        task.enqueued. A separate worker consumes the job and runs the
        rule-based business stage workflow: understand_goal_rule,
        plan_search_llm, retrieve_sources, normalize_candidates, and
        evidence_extract_llm, response_compose_llm, then grounding_guard_llm.
        All Agent LLM stages must go through the LLM Gateway for timeout,
        retry, JSON parse, schema validation, and fallback control.
        retrieve_sources reuses the existing search service when Zhihu config
        is available and writes a fallback stage/artifact otherwise.
        evidence_extract_llm produces an evidence artifact or rule fallback
        artifact without failing the task. response_compose_llm produces a
        final_result artifact or rule fallback artifact without failing the
        task. grounding_guard_llm produces a guarded_final_result artifact or
        rule fallback artifact without failing the task. Before completion,
        the worker writes a production_final_result artifact after deterministic
        sourceRefs validation. It does not run persona build, the demo search
        orchestrator, WebSocket/SSE, or stream events.
      operationId: createPersistentAgentTask
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersistentAgentTaskCreateRequest"
            examples:
              default:
                value:
                  query: 不工作了之后，我想去新西兰生活
                  metadata: {}
      responses:
        "200":
          description: Persistent Agent task created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistentAgentTaskCreateResponse"
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "503":
          description: DATABASE_URL or REDIS_URL is not configured, or Postgres/Redis is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/agent/tasks/{taskId}:
    get:
      tags:
        - Agent
      summary: Get current agent task state
      description: >
        First checks the legacy in-memory Agent task store used by
        /api/agent/search. If no in-memory task exists, checks the Phase 1
        persistent Postgres task store and returns product-facing task status,
        stage progress, partial/result availability, degraded flags, and
        structured error information.
      operationId: getDemoSearchAgentTask
      x-implementation-status: implemented
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current in-memory Agent task or persistent Agent task status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentTaskResponse"
        "404":
          description: Task does not exist or expired from the in-memory store and was not found in Postgres.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/agent/tasks/{taskId}/result:
    get:
      tags:
        - Agent
      summary: Read a persistent Agent task final result
      description: >
        Phase 1 result endpoint. Returns 202 with task status and pollAfterMs
        while the task is not succeeded. Once succeeded, returns final_result
        with paths, personas, sources, evidenceMap, groundingReport, degraded
        flags, and deterministic sourceRefs validation.
      operationId: getPersistentAgentTaskResult
      x-implementation-status: implemented-phase1
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Final result is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistentAgentTaskResultResponse"
        "202":
          description: Task is not finished yet; poll again later.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistentAgentTaskStatusResponse"
        "404":
          description: Persistent task was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Task succeeded but final_result was unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/agent/tasks/{taskId}/view:
    get:
      tags:
        - Agent
      summary: Get persistent Agent task view for the frontend
      description: >
        Phase 8 read-only adapter for visible product demos. Reads the
        persistent Postgres task snapshot and maps guarded_final_result,
        candidates and evidence artifacts into a frontend-friendly task view.
        The result field reuses the demo display shape with analysis, paths,
        people, personas, sections and meta. This endpoint does not check the
        legacy in-memory task store and does not mutate task state.
      operationId: getPersistentAgentTaskView
      x-implementation-status: implemented-phase8
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Frontend-friendly persistent Agent task view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistentAgentTaskViewResponse"
        "404":
          description: Persistent task was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/agent/tasks/{taskId}/debug:
    get:
      tags:
        - Agent
      summary: Get internal Agent task debug summary
      description: >
        Phase 4 internal/local debug endpoint. Returns structured task,
        stage, event and artifact summaries for bad-case diagnosis without
        returning full source bodies or sensitive metadata. Disabled when
        NODE_ENV/APP_ENV is production.
      operationId: getPersistentAgentTaskDebug
      x-implementation-status: implemented-phase4
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Internal debug summary for a persistent Agent task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersistentAgentTaskDebugResponse"
        "404":
          description: Persistent task was not found or debug endpoint is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/personas/chat:
    post:
      tags:
        - Personas
      summary: Chat with an evidence-grounded AI persona
      description: >
        P0.5 target contract for asking a follow-up question to a persona
        attached to people[].aiPersona. The answer must be grounded in public
        article/evidence snippets, must include citedArticleIds and boundary,
        and must not pretend to be the original author.
      operationId: chatWithPersona
      x-implementation-status: planned-p0.5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonaChatRequest"
            examples:
              default:
                value:
                  queryId: query_demo_001
                  personId: person_return_home
                  personaId: persona_person_return_home
                  message: 你当时最担心什么？
                  history: []
      responses:
        "200":
          description: Grounded persona chat response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaChatSuccessResponse"
              examples:
                groundedMock:
                  value:
                    success: true
                    data:
                      messageId: msg_demo_001
                      personaId: persona_person_return_home
                      personId: person_return_home
                      answer: 从公开内容看，TA 更像是在离开高压工作后先恢复生活节奏，而不是已经完成长期迁移规划。
                      answerType: grounded_summary
                      citedArticleIds:
                        - article_return_home_001
                      evidence:
                        - articleId: article_return_home_001
                          text: 公开内容中的证据片段。
                          sourceUrl: https://www.zhihu.com/question/mock/answer/return-home
                      followupQuestions:
                        - 你想看 TA 当时怎么准备现金流吗？
                      boundary: 这是基于知乎公开内容生成的经验回应，不代表作者本人。
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Backend error. Stub mode should be available when LLM keys are missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/demo/session/{sessionId}:
    get:
      tags:
        - Planned
      summary: "[planned] Fetch a demo session by id"
      description: >
        Planned/future endpoint. It is not implemented in the current backend.
        Frontend should not call this endpoint for P0 integration.
      operationId: getDemoSession
      x-implementation-status: planned
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
          example: s_demo_001
      responses:
        "501":
          description: Planned endpoint, not implemented yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                planned:
                  value:
                    success: false
                    error:
                      code: NOT_IMPLEMENTED
                      message: Planned endpoint, not implemented yet.
components:
  schemas:
    RootHealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - zhihu-hackathon-backend
        version:
          type: string
    ApiHealthResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - status
            - service
          properties:
            status:
              type: string
              enum:
                - ok
            service:
              type: string
              enum:
                - zhihu-hackathon-backend
    AuthMeResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/AuthSessionData"
    AuthSessionData:
      type: object
      required:
        - id
        - name
        - avatar
        - profileUrl
        - provider
        - userInfoLoaded
        - user
        - session
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
        profileUrl:
          type: string
          description: Public Zhihu profile URL when available, otherwise an empty string.
        provider:
          type: string
          enum:
            - zhihu
        userInfoLoaded:
          type: boolean
          description: False when ZHIHU_USERINFO_PATH was not configured during login.
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          type: object
          required:
            - createdAt
            - expiresAt
          properties:
            createdAt:
              type: string
              format: date-time
            expiresAt:
              type: string
              format: date-time
    AuthUser:
      type: object
      required:
        - id
        - provider
        - displayName
        - avatar
        - profileUrl
        - headline
        - isTemporary
        - userInfoLoaded
      properties:
        id:
          type: string
        provider:
          type: string
          enum:
            - zhihu
        displayName:
          type: string
        avatar:
          type: string
        profileUrl:
          type: string
        headline:
          type: string
        isTemporary:
          type: boolean
        userInfoLoaded:
          type: boolean
    LogoutResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - loggedOut
          properties:
            loggedOut:
              type: boolean
              const: true
    SearchSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/SearchResult"
    SearchResult:
      type: object
      required:
        - query
        - count
        - hasMore
        - searchHashId
        - items
      properties:
        query:
          type: string
          description: Trimmed user query.
        count:
          type: integer
          description: Server-normalized requested result count.
        hasMore:
          type: boolean
          description: Whether upstream reports more results.
        searchHashId:
          type: string
          description: Upstream search cursor/hash. Can be an empty string.
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchItem"
    SearchItem:
      type: object
      required:
        - id
        - type
        - title
        - text
        - url
        - author
        - stats
        - comments
        - editTime
        - authorityLevel
        - source
        - evidence
      properties:
        id:
          type: string
        type:
          type: string
          description: Upstream content type. Can be an empty string.
        title:
          type: string
          description: Content title. Can be an empty string.
        text:
          type: string
          description: Main content text or excerpt. Can be an empty string.
        url:
          type: string
          description: Original Zhihu URL. Can be an empty string if upstream omits it.
        author:
          $ref: "#/components/schemas/SearchAuthor"
        stats:
          $ref: "#/components/schemas/SearchStats"
        comments:
          type: array
          items: {}
          description: Raw comments array when provided by upstream. Usually empty for P0.
        editTime:
          type: number
          description: Upstream edit timestamp. 0 when missing.
        authorityLevel:
          type: string
          description: Upstream authority level. Can be an empty string.
        source:
          $ref: "#/components/schemas/SearchSource"
        evidence:
          $ref: "#/components/schemas/SearchEvidence"
    SearchAuthor:
      type: object
      required:
        - name
        - avatar
        - badge
        - badgeText
      properties:
        name:
          type: string
          description: Author display name. Can be an empty string.
        avatar:
          type: string
          description: Author avatar URL. Can be an empty string.
        badge:
          type: string
          description: Raw author badge. Can be an empty string.
        badgeText:
          type: string
          description: Human-readable author badge. Can be an empty string.
    SearchStats:
      type: object
      required:
        - commentCount
        - voteUpCount
        - rankingScore
      properties:
        commentCount:
          type: number
        voteUpCount:
          type: number
        rankingScore:
          type: number
    SearchSource:
      type: object
      required:
        - provider
        - url
      properties:
        provider:
          type: string
          enum:
            - zhihu
        url:
          type: string
          description: Original content URL. Can be an empty string for malformed upstream data.
    SearchEvidence:
      type: object
      required:
        - text
        - source
      properties:
        text:
          type: string
          description: Evidence text derived from the original content. Can be empty in P0 errors or incomplete upstream data.
        source:
          $ref: "#/components/schemas/SearchSource"
    ZhihuRingPublishRequest:
      type: object
      required:
        - ringId
        - title
        - content
      properties:
        ringId:
          type: string
          enum:
            - "2001009660925334090"
            - "2015023739549529606"
            - "2029619126742656657"
          description: Allowlisted Zhihu ring id.
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        imageUrls:
          type: array
          items:
            type: string
            format: uri
          default: []
          description: Optional existing image URLs only. The backend does not upload images.
    ZhihuRingPublishSuccessResponse:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - contentToken
          properties:
            contentToken:
              type: string
              description: content_token returned by Zhihu.
        meta:
          type: object
          required:
            - ringId
            - logId
          properties:
            ringId:
              type: string
            logId:
              type: string
              description: X-Log-Id generated for the upstream OpenAPI request.
    ZhihuRawSearchResponse:
      type: object
      additionalProperties: true
      properties:
        Code:
          oneOf:
            - type: integer
            - type: string
        Message:
          type: string
        Data:
          description: Raw upstream payload.
    ApiErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    AgentTaskStartResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - taskId
            - status
            - createdAt
          properties:
            taskId:
              type: string
            status:
              type: string
              const: running
            createdAt:
              type: string
              format: date-time
    PersistentAgentTaskCreateRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        metadata:
          type: object
          additionalProperties: true
          default: {}
    PersistentAgentTaskCreateResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - taskId
            - status
            - frontendStatus
            - pollAfterMs
            - resultUrl
          properties:
            taskId:
              type: string
            status:
              type: string
