          type: string
        stage:
          type: string
    DemoSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          description: Raw user question.
        count:
          type: integer
          minimum: 1
          maximum: 20
          default: 20
          description: Desired recall count before product-layer grouping.
        mode:
          type: string
          enum:
            - mock
            - cache_first
            - real
          default: mock
          description: Data mode. P0 must work in mock mode without Zhihu or LLM keys.
        sessionId:
          type: string
          description: Optional client-provided session id for local demo continuity.
    DemoSearchResponse:
      type: object
      required:
        - schemaVersion
        - queryId
        - query
        - dataMode
        - features
        - analysis
        - paths
        - people
        - personas
        - sections
        - meta
      properties:
        schemaVersion:
          type: string
          example: "2026-05-13.ai-persona-v1"
        queryId:
          type: string
          description: Stable id that links search, save and persona chat flows.
        query:
          type: string
        dataMode:
          type: string
          enum:
            - mock
            - cache_first
            - real
        contextUsed:
          $ref: "#/components/schemas/DemoContextUsed"
        features:
          $ref: "#/components/schemas/DemoFeatures"
        analysis:
          $ref: "#/components/schemas/DemoAnalysis"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/DemoPath"
        people:
          type: array
          description: Primary person/sample data. AI personas hang under each person.
          items:
            $ref: "#/components/schemas/DemoPerson"
        personas:
          type: array
          description: Shortcut index only. Do not duplicate complete person data here.
          items:
            $ref: "#/components/schemas/PersonaIndex"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/DemoSection"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        debug:
          $ref: "#/components/schemas/DemoDebug"
    DemoContextUsed:
      type: object
      description: >
        Optional debug-safe summary of whether lightweight Zhihu OAuth profile
        context influenced intent expansion, query expansion or fit reasons.
        It must not expose tokens, cookies, raw userInfo, full profile objects
        or grounding evidence.
      required:
        - provider
        - loggedIn
        - zhihuProfileUsed
        - profileSignals
        - usedFor
      properties:
        provider:
          type: string
          enum:
            - zhihu
        loggedIn:
          type: boolean
        zhihuProfileUsed:
          type: boolean
          description: True only when non-sensitive profileSignals were actually used.
        profileSignals:
          type: array
          description: Non-sensitive occupation/interest terms extracted from basic profile fields.
          items:
            type: string
        usedFor:
          type: array
          items:
            type: string
            enum:
              - intent_expand
              - search_query_expand
              - fit_reason
    DemoSessionResponse:
      allOf:
        - $ref: "#/components/schemas/DemoSearchResponse"
        - type: object
          properties:
            status:
              type: string
              enum:
                - active
                - expired
    DemoFeatures:
      type: object
      required:
        - aiPersona
        - personaChat
        - saveSample
        - articleBody
        - sourceEvidenceRequired
      properties:
        aiPersona:
          type: boolean
          description: Whether persona entry points may be shown if person-level aiPersona is enabled.
        personaChat:
          type: string
          enum:
            - "off"
            - mock
            - real
          description: Persona chat capability for the current response.
        saveSample:
          type: boolean
          description: Whether server-side save sample is available. P0 may be false.
        articleBody:
          type: boolean
          description: Whether full article body blocks are available. P0 may be false.
        sourceEvidenceRequired:
          type: boolean
          description: Whether frontend should require evidence before showing factual claims.
    DemoAnalysis:
      type: object
      required:
        - steps
        - focusTags
      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisStep"
        focusTags:
          type: array
          items:
            type: string
        summary:
          type: string
        openQuestions:
          type: array
          items:
            type: string
    AnalysisStep:
      type: object
      required:
        - title
        - text
      properties:
        title:
          type: string
        text:
          type: string
    DemoPath:
      type: object
      required:
        - id
        - title
        - summary
        - stance
        - evidenceIds
        - sourceRefs
      properties:
        id:
          type: string
        title:
          type: string
          description: Concrete life path title, not an abstract label.
        summary:
          type: string
          description: What this path is, grounded in source content.
        whyRelevant:
          type: string
          description: Why this path relates to the user's original question.
        tradeoff:
          type: string
          description: Cost, risk, limitation, or uncertainty for this path.
        displayLabel:
          type: string
          description: Human-facing path label. Must not expose roughTier, roughScore, diversityKey, contentRole, keepReason, or fallback/debug wording.
        displayTradeoff:
          type: string
          description: Human-facing tradeoff copy safe for direct frontend display.
        fitReason:
          type: string
          description: Optional evidence-aware explanation of why this path may fit the user query/profile context.
        diversityKey:
          type: string
          description: Debug/display hint used to avoid homogeneous paths.
        stance:
          type: string
          enum:
            - experience
            - viewpoint
            - mixed
        personRefs:
          type: array
          items:
            type: string
        evidenceIds:
          type: array
          items:
            type: string
        sourceRefs:
          type: array
          minItems: 1
          items:
            type: string
    DemoPerson:
      type: object
      required:
        - id
        - name
        - pathId
        - role
        - badge
        - avatar
        - oneLine
        - experienceSummary
        - experienceSummarySource
        - experienceSummaryStatus
        - who
        - overlaps
        - timeline
        - lesson
        - articles
        - match
        - aiPersona
      properties:
        id:
          type: string
        name:
          type: string
          description: Display name from public content. Empty values should fall back to 知乎用户.
        pathId:
          type: string
          description: Must reference paths[].id.
        role:
          type: string
        roleLabel:
          type: string
          description: Optional path-representative role label for this public sample.
        badge:
          type: string
        displayTier:
          type: string
          enum:
            - core
            - supplement
          description: core means match.level is high/medium, evidenceQuality >= 0.65, and contentRelevance >= 0.25; otherwise supplement.
        evidenceStatus:
          type: string
          enum:
            - llm_extracted
            - raw_snippet_only
          description: raw_snippet_only means frontend should show 来源片段 rather than AI 证据提炼.
        canChat:
          type: boolean
          description: Whether the frontend may show a persona follow-up entry. False should degrade to 查看来源片段.
        displayLabel:
          type: string
          example: 补充参考样本
        displayTradeoff:
          type: string
          description: User-facing limitation or downgrade copy for this sample.
        avatar:
          type: string
        oneLine:
          type: string
        experienceSummary:
          type:
            - string
            - "null"
          description: >
            LLM-generated summary of the author's/sample's situation, choice,
            cost/turning point/result, and relevance to the current query. Null
            when the LLM did not produce a grounded experience-style summary.
        experienceSummarySource:
          type: string
          enum:
            - llm
            - fallback
            - none
          description: Main display should use llm only; fallback/none must not be shown as primary summary.
        experienceSummaryStatus:
          type: string
          enum:
            - ready
            - pending
            - failed
          description: Frontend should display experienceSummary only when status is ready and source is llm.
        experienceSummaryConfidence:
          type: number
          minimum: 0
          maximum: 1
          description: Optional confidence score for LLM-generated experienceSummary.
        matchedPathTitle:
          type: string
          description: The path this person represents.
        relevanceReason:
          type: string
          description: Why this sample is relevant under the user's question.
        fitReason:
          type: string
          description: Optional evidence-aware explanation; user context is not a grounding source.
        who:
          type: string
          description: Description based on public content, not a complete biography.
        overlaps:
          type: array
          items:
            type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineItem"
        lesson:
          type: string
        articles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PersonArticle"
        match:
          $ref: "#/components/schemas/PersonMatch"
        aiPersona:
          $ref: "#/components/schemas/AiPersona"
    TimelineItem:
      type: object
      required:
        - date
        - event
      properties:
        date:
          type: string
        event:
          type: string
    PersonArticle:
      type: object
      required:
        - id
        - title
        - text
        - url
        - author
        - avatar
        - sourceName
        - sourceUrl
        - summary
        - evidence
      properties:
        id:
          type: string
        title:
          type: string
          description: Article or answer title. Frontend falls back to text/summary if empty.
        text:
          type: string
          description: Original excerpt or body snippet.
        url:
          type: string
          description: Original Zhihu URL. Hide source action if empty.
        author:
          type: string
          description: Author display name. Frontend falls back to 知乎用户 if empty.
        avatar:
          type: string
          description: Author avatar. Frontend falls back to a default avatar if empty.
        sourceName:
          type: string
          example: 知乎回答
        sourceUrl:
          type: string
        publishedAt:
          type: string
        summary:
          type: string
        evidenceStatus:
          type: string
          enum:
            - llm_extracted
            - raw_snippet_only
        evidenceText:
          type: string
          description: Display evidence text, preferring evidence[0].text, then summary, then a text slice.
        evidence:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ArticleEvidence"
        body:
          type: array
          items:
            $ref: "#/components/schemas/Block"
    ArticleEvidence:
      type: object
      required:
        - label
        - text
        - sourceUrl
      properties:
        label:
          type: string
        text:
          type: string
        sourceUrl:
          type: string
    PersonMatch:
      type: object
