openapi: 3.1.0
info:
  title: Zhihu Hackathon Demo API
  version: 0.2.0
  description: >
    Shared contract for the current monorepo scaffold. GET /api/search remains
    the implemented search mapping endpoint and must not be broken. The P0
    product-layer contract for the AI persona experience is POST
    /api/demo/search; persona chat is planned for P0.5 at POST
    /api/personas/chat.
servers:
  - url: http://localhost:8000
    description: Local backend
tags:
  - name: Health
    description: Implemented health checks.
  - name: Auth
    description: Implemented Zhihu OAuth login and session endpoints.
  - name: Search
    description: Implemented search endpoints.
  - name: Zhihu
    description: Implemented raw Zhihu proxy endpoints.
  - name: Demo
    description: Product-layer demo contracts for analysis, paths, people and AI personas.
  - name: Personas
    description: AI persona chat contracts grounded in public content evidence.
  - name: Planned
    description: Future demo endpoints, not implemented in the backend yet.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Root health check
      description: Implemented. Used by smoke tests and local demo checks.
      operationId: getRootHealth
      x-implementation-status: implemented
      responses:
        "200":
          description: Backend is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootHealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    service: zhihu-hackathon-backend
                    version: 0.1.0
  /api/health:
    get:
      tags:
        - Health
      summary: API health check
      description: Implemented. Keeps the existing wrapped API response shape.
      operationId: getApiHealth
      x-implementation-status: implemented
      responses:
        "200":
          description: Backend API is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiHealthResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      status: ok
                      service: zhihu-hackathon-backend
  /auth/zhihu/login:
    get:
      tags:
        - Auth
      summary: Start Zhihu OAuth login
      description: >
        Implemented. Creates a short-lived OAuth state, stores it in an
        HttpOnly cookie and server memory, then redirects the browser to
        Zhihu's authorization endpoint. ZHIHU_APP_ID and ZHIHU_APP_KEY are
        required only when this endpoint is called, so the server can still
        start without local OAuth credentials.
      operationId: loginWithZhihu
      x-implementation-status: implemented
      responses:
        "302":
          description: Redirects to Zhihu authorization page.
          headers:
            Location:
              schema:
                type: string
              description: Zhihu authorization URL.
        "500":
          description: Missing local Zhihu OAuth credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingOAuthConfig:
                  value:
                    success: false
                    error:
                      code: ZHIHU_OAUTH_NOT_CONFIGURED
                      message: 知乎 OAuth 未配置：ZHIHU_APP_ID, ZHIHU_APP_KEY
  /auth/zhihu/callback:
    get:
      tags:
        - Auth
      summary: Finish Zhihu OAuth callback
      description: >
        Implemented. Validates OAuth state, exchanges the authorization code
        for an access token on the backend, optionally loads user info from
        ZHIHU_USERINFO_PATH, creates an in-memory app session, sets an HttpOnly
        session cookie, and redirects to FRONTEND_URL.
      operationId: zhihuOAuthCallback
      x-implementation-status: implemented
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Login succeeded and browser is redirected to the frontend.
          headers:
            Location:
              schema:
                type: string
              description: Configured FRONTEND_URL.
        "400":
          description: Missing code/state or failed state validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "502":
          description: Zhihu OAuth token or configured user-info request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current login session
      description: >
        Implemented. Reads the HttpOnly session cookie and returns the current
        app session user data. Access tokens are never included in this
        response. If ZHIHU_USERINFO_PATH was not configured during login,
        userInfoLoaded is false and the user is a temporary demo user.
      operationId: getCurrentAuthSession
      x-implementation-status: implemented
      responses:
        "200":
          description: Current session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
              examples:
                temporary:
                  value:
                    success: true
                    data:
                      provider: zhihu
                      userInfoLoaded: false
                      user:
                        id: zhihu-temp-example
                        provider: zhihu
                        displayName: 知乎临时用户
                        avatar: ""
                        headline: ""
                        isTemporary: true
                        userInfoLoaded: false
                      session:
                        createdAt: "2026-05-13T00:00:00.000Z"
                        expiresAt: "2026-05-20T00:00:00.000Z"
        "401":
          description: Missing or expired session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Clear current login session
      description: Implemented. Deletes the in-memory session and clears the HttpOnly cookie.
      operationId: logout
      x-implementation-status: implemented
      responses:
        "200":
          description: Logout succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                ok:
                  value:
                    success: true
                    data:
                      loggedOut: true
  /api/search:
    get:
      tags:
        - Search
      summary: Frontend-friendly search endpoint
      description: >
        Implemented. This is the existing frontend-friendly Zhihu search
        mapping endpoint and remains available for compatibility, debugging
        and product-layer recall. The P0 AI persona product contract is POST
        /api/demo/search. Without a real Zhihu key, this endpoint returns a
        clear JSON error instead of crashing.
      operationId: getSearch
      x-implementation-status: implemented
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          example: 不工作了能去哪儿
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          example: 1
      responses:
        "200":
          description: Search succeeded and was mapped into frontend-friendly fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchSuccessResponse"
              examples:
                success:
                  value:
                    success: true
                    data:
                      query: 不工作了能去哪儿
                      count: 1
                      hasMore: false
                      searchHashId: ""
                      items:
                        - id: zhihu_item_1
                          type: answer
                          title: 裸辞以后可以去哪里
                          text: 一段来自知乎内容或 mock 内容的摘要。
                          url: https://www.zhihu.com/question/mock/answer/mock
                          author:
                            name: 知乎作者
                            avatar: ""
                            badge: ""
                            badgeText: ""
                          stats:
                            commentCount: 0
                            voteUpCount: 0
                            rankingScore: 0
                          comments: []
                          editTime: 0
                          authorityLevel: ""
                          source:
                            provider: zhihu
                            url: https://www.zhihu.com/question/mock/answer/mock
                          evidence:
                            text: 一段来自知乎内容或 mock 内容的摘要。
                            source:
                              provider: zhihu
                              url: https://www.zhihu.com/question/mock/answer/mock
        "400":
          description: Missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Missing local Zhihu credentials or other backend error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingKey:
                  value:
                    success: false
                    error:
                      code: ZHIHU_AUTH_FAILED
                      message: 知乎 API 鉴权失败
  /api/zhihu/search:
    get:
      tags:
        - Zhihu
      summary: Raw Zhihu search proxy
      description: >
        Implemented. This endpoint is mainly for backend debugging because it
        returns the raw upstream Zhihu response when credentials are configured.
        Frontend should prefer GET /api/search.
      operationId: getZhihuSearchRaw
      x-implementation-status: implemented
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          example: 不工作了能去哪儿
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          example: 1
      responses:
        "200":
          description: Raw Zhihu response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZhihuRawSearchResponse"
              examples:
                raw:
                  value:
                    Code: 200
                    Message: OK
                    Data:
                      HasMore: false
                      SearchHashId: ""
                      Items: []
        "400":
          description: Missing or invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Missing local Zhihu credentials or other backend error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                missingKey:
                  value:
                    success: false
                    error:
                      code: ZHIHU_AUTH_FAILED
                      message: 知乎 API 鉴权失败
  /api/demo/search:
    post:
      tags:
        - Demo
      summary: Create an AI-persona-ready demo search result
      description: >
        P0 product-layer target contract for the frontend AI persona
        experience. It wraps search results into analysis, paths, people,
        persona indexes, sections and metadata. The existing GET /api/search
        contract remains implemented and must not be broken. During P0
        implementation, this endpoint must run with mock/stub data when Zhihu
        API keys or LLM keys are missing.
      operationId: createDemoSearch
      x-implementation-status: planned-p0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoSearchRequest"
            examples:
              default:
                value:
                  query: 不工作了之后，我想去新西兰生活
                  count: 20
                  mode: mock
      responses:
        "200":
          description: Product-layer search response with AI persona entry points.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoSearchResponse"
              examples:
                aiPersona:
                  value:
                    schemaVersion: "2026-05-13.ai-persona-v1"
                    queryId: query_demo_001
                    query: 不工作了之后，我想去新西兰生活
                    dataMode: mock
                    features:
                      aiPersona: true
                      personaChat: mock
                      saveSample: false
                      articleBody: false
                      sourceEvidenceRequired: true
                    analysis:
                      steps:
                        - title: 读取问题
                          text: 不工作了之后，我想去新西兰生活
                      focusTags:
                        - 暂停工作
                        - 新西兰
                    paths: []
                    people: []
                    personas: []
                    sections: []
                    meta:
                      mode: mock
                      generatedAt: "2026-05-13T00:00:00.000Z"
                    debug:
                      stubbed: true
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Backend error. P0 implementation should prefer mock/stub fallback when keys are missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/personas/chat:
    post:
      tags:
        - Personas
      summary: Chat with an evidence-grounded AI persona
      description: >
        P0.5 target contract for asking a follow-up question to a persona
        attached to people[].aiPersona. The answer must be grounded in public
        article/evidence snippets, must include citedArticleIds and boundary,
        and must not pretend to be the original author.
      operationId: chatWithPersona
      x-implementation-status: planned-p0.5
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonaChatRequest"
            examples:
              default:
                value:
                  queryId: query_demo_001
                  personId: person_return_home
                  personaId: persona_person_return_home
                  message: 你当时最担心什么？
                  history: []
      responses:
        "200":
          description: Grounded persona chat response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaChatSuccessResponse"
              examples:
                groundedMock:
                  value:
                    success: true
                    data:
                      messageId: msg_demo_001
                      personaId: persona_person_return_home
                      personId: person_return_home
                      answer: 从公开内容看，TA 更像是在离开高压工作后先恢复生活节奏，而不是已经完成长期迁移规划。
                      answerType: grounded_summary
                      citedArticleIds:
                        - article_return_home_001
                      evidence:
                        - articleId: article_return_home_001
                          text: 公开内容中的证据片段。
                          sourceUrl: https://www.zhihu.com/question/mock/answer/return-home
                      followupQuestions:
                        - 你想看 TA 当时怎么准备现金流吗？
                      boundary: 这是基于知乎公开内容生成的经验回应，不代表作者本人。
        "400":
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          description: Backend error. Stub mode should be available when LLM keys are missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/demo/session/{sessionId}:
    get:
      tags:
        - Planned
      summary: "[planned] Fetch a demo session by id"
      description: >
        Planned/future endpoint. It is not implemented in the current backend.
        Frontend should not call this endpoint for P0 integration.
      operationId: getDemoSession
      x-implementation-status: planned
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
          example: s_demo_001
      responses:
        "501":
          description: Planned endpoint, not implemented yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              examples:
                planned:
                  value:
                    success: false
                    error:
                      code: NOT_IMPLEMENTED
                      message: Planned endpoint, not implemented yet.
components:
  schemas:
    RootHealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - zhihu-hackathon-backend
        version:
          type: string
    ApiHealthResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - status
            - service
          properties:
            status:
              type: string
              enum:
                - ok
            service:
              type: string
              enum:
                - zhihu-hackathon-backend
    AuthMeResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/AuthSessionData"
    AuthSessionData:
      type: object
      required:
        - provider
        - userInfoLoaded
        - user
        - session
      properties:
        provider:
          type: string
          enum:
            - zhihu
        userInfoLoaded:
          type: boolean
          description: False when ZHIHU_USERINFO_PATH was not configured during login.
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          type: object
          required:
            - createdAt
            - expiresAt
          properties:
            createdAt:
              type: string
              format: date-time
            expiresAt:
              type: string
              format: date-time
    AuthUser:
      type: object
      required:
        - id
        - provider
        - displayName
        - avatar
        - headline
        - isTemporary
        - userInfoLoaded
      properties:
        id:
          type: string
        provider:
          type: string
          enum:
            - zhihu
        displayName:
          type: string
        avatar:
          type: string
        headline:
          type: string
        isTemporary:
          type: boolean
        userInfoLoaded:
          type: boolean
    LogoutResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required:
            - loggedOut
          properties:
            loggedOut:
              type: boolean
              const: true
    SearchSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/SearchResult"
    SearchResult:
      type: object
      required:
        - query
        - count
        - hasMore
        - searchHashId
        - items
      properties:
        query:
          type: string
          description: Trimmed user query.
        count:
          type: integer
          description: Server-normalized requested result count.
        hasMore:
          type: boolean
          description: Whether upstream reports more results.
        searchHashId:
          type: string
          description: Upstream search cursor/hash. Can be an empty string.
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchItem"
    SearchItem:
      type: object
      required:
        - id
        - type
        - title
        - text
        - url
        - author
        - stats
        - comments
        - editTime
        - authorityLevel
        - source
        - evidence
      properties:
        id:
          type: string
        type:
          type: string
          description: Upstream content type. Can be an empty string.
        title:
          type: string
          description: Content title. Can be an empty string.
        text:
          type: string
          description: Main content text or excerpt. Can be an empty string.
        url:
          type: string
          description: Original Zhihu URL. Can be an empty string if upstream omits it.
        author:
          $ref: "#/components/schemas/SearchAuthor"
        stats:
          $ref: "#/components/schemas/SearchStats"
        comments:
          type: array
          items: {}
          description: Raw comments array when provided by upstream. Usually empty for P0.
        editTime:
          type: number
          description: Upstream edit timestamp. 0 when missing.
        authorityLevel:
          type: string
          description: Upstream authority level. Can be an empty string.
        source:
          $ref: "#/components/schemas/SearchSource"
        evidence:
          $ref: "#/components/schemas/SearchEvidence"
    SearchAuthor:
      type: object
      required:
        - name
        - avatar
        - badge
        - badgeText
      properties:
        name:
          type: string
          description: Author display name. Can be an empty string.
        avatar:
          type: string
          description: Author avatar URL. Can be an empty string.
        badge:
          type: string
          description: Raw author badge. Can be an empty string.
        badgeText:
          type: string
          description: Human-readable author badge. Can be an empty string.
    SearchStats:
      type: object
      required:
        - commentCount
        - voteUpCount
        - rankingScore
      properties:
        commentCount:
          type: number
        voteUpCount:
          type: number
        rankingScore:
          type: number
    SearchSource:
      type: object
      required:
        - provider
        - url
      properties:
        provider:
          type: string
          enum:
            - zhihu
        url:
          type: string
          description: Original content URL. Can be an empty string for malformed upstream data.
    SearchEvidence:
      type: object
      required:
        - text
        - source
      properties:
        text:
          type: string
          description: Evidence text derived from the original content. Can be empty in P0 errors or incomplete upstream data.
        source:
          $ref: "#/components/schemas/SearchSource"
    ZhihuRawSearchResponse:
      type: object
      additionalProperties: true
      properties:
        Code:
          oneOf:
            - type: integer
            - type: string
        Message:
          type: string
        Data:
          description: Raw upstream payload.
    ApiErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    DemoSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          description: Raw user question.
        count:
          type: integer
          minimum: 1
          maximum: 20
          default: 20
          description: Desired recall count before product-layer grouping.
        mode:
          type: string
          enum:
            - mock
            - cache_first
            - real
          default: mock
          description: Data mode. P0 must work in mock mode without Zhihu or LLM keys.
        sessionId:
          type: string
          description: Optional client-provided session id for local demo continuity.
    DemoSearchResponse:
      type: object
      required:
        - schemaVersion
        - queryId
        - query
        - dataMode
        - features
        - analysis
        - paths
        - people
        - personas
        - sections
        - meta
      properties:
        schemaVersion:
          type: string
          example: "2026-05-13.ai-persona-v1"
        queryId:
          type: string
          description: Stable id that links search, save and persona chat flows.
        query:
          type: string
        dataMode:
          type: string
          enum:
            - mock
            - cache_first
            - real
        features:
          $ref: "#/components/schemas/DemoFeatures"
        analysis:
          $ref: "#/components/schemas/DemoAnalysis"
        paths:
          type: array
          items:
            $ref: "#/components/schemas/DemoPath"
        people:
          type: array
          description: Primary person/sample data. AI personas hang under each person.
          items:
            $ref: "#/components/schemas/DemoPerson"
        personas:
          type: array
          description: Shortcut index only. Do not duplicate complete person data here.
          items:
            $ref: "#/components/schemas/PersonaIndex"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/DemoSection"
        meta:
          $ref: "#/components/schemas/ResponseMeta"
        debug:
          $ref: "#/components/schemas/DemoDebug"
    DemoSessionResponse:
      allOf:
        - $ref: "#/components/schemas/DemoSearchResponse"
        - type: object
          properties:
            status:
              type: string
              enum:
                - active
                - expired
    DemoFeatures:
      type: object
      required:
        - aiPersona
        - personaChat
        - saveSample
        - articleBody
        - sourceEvidenceRequired
      properties:
        aiPersona:
          type: boolean
          description: Whether persona entry points may be shown if person-level aiPersona is enabled.
        personaChat:
          type: string
          enum:
            - "off"
            - mock
            - real
          description: Persona chat capability for the current response.
        saveSample:
          type: boolean
          description: Whether server-side save sample is available. P0 may be false.
        articleBody:
          type: boolean
          description: Whether full article body blocks are available. P0 may be false.
        sourceEvidenceRequired:
          type: boolean
          description: Whether frontend should require evidence before showing factual claims.
    DemoAnalysis:
      type: object
      required:
        - steps
        - focusTags
      properties:
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisStep"
        focusTags:
          type: array
          items:
            type: string
        summary:
          type: string
        openQuestions:
          type: array
          items:
            type: string
    AnalysisStep:
      type: object
      required:
        - title
        - text
      properties:
        title:
          type: string
        text:
          type: string
    DemoPath:
      type: object
      required:
        - id
        - name
        - count
        - desc
      properties:
        id:
          type: string
        name:
          type: string
        count:
          type: integer
          minimum: 0
        desc:
          type: string
        short:
          type: string
    DemoPerson:
      type: object
      required:
        - id
        - name
        - pathId
        - role
        - badge
        - avatar
        - oneLine
        - who
        - overlaps
        - timeline
        - lesson
        - articles
        - match
        - aiPersona
      properties:
        id:
          type: string
        name:
          type: string
          description: Display name from public content. Empty values should fall back to 知乎用户.
        pathId:
          type: string
          description: Must reference paths[].id.
        role:
          type: string
        badge:
          type: string
        avatar:
          type: string
        oneLine:
          type: string
        who:
          type: string
          description: Description based on public content, not a complete biography.
        overlaps:
          type: array
          items:
            type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineItem"
        lesson:
          type: string
        articles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PersonArticle"
        match:
          $ref: "#/components/schemas/PersonMatch"
        aiPersona:
          $ref: "#/components/schemas/AiPersona"
    TimelineItem:
      type: object
      required:
        - date
        - event
      properties:
        date:
          type: string
        event:
          type: string
    PersonArticle:
      type: object
      required:
        - id
        - title
        - text
        - url
        - author
        - avatar
        - sourceName
        - sourceUrl
        - summary
        - evidence
      properties:
        id:
          type: string
        title:
          type: string
          description: Article or answer title. Frontend falls back to text/summary if empty.
        text:
          type: string
          description: Original excerpt or body snippet.
        url:
          type: string
          description: Original Zhihu URL. Hide source action if empty.
        author:
          type: string
          description: Author display name. Frontend falls back to 知乎用户 if empty.
        avatar:
          type: string
          description: Author avatar. Frontend falls back to a default avatar if empty.
        sourceName:
          type: string
          example: 知乎回答
        sourceUrl:
          type: string
        publishedAt:
          type: string
        summary:
          type: string
        evidence:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ArticleEvidence"
        body:
          type: array
          items:
            $ref: "#/components/schemas/Block"
    ArticleEvidence:
      type: object
      required:
        - label
        - text
        - sourceUrl
      properties:
        label:
          type: string
        text:
          type: string
        sourceUrl:
          type: string
    PersonMatch:
      type: object
      required:
        - score
        - level
        - reasons
        - matchedVariables
        - riskNotes
        - contentRelevance
        - experienceSimilarity
        - evidenceQuality
        - personaReadiness
      properties:
        score:
          type: number
          minimum: 0
          maximum: 1
        level:
          type: string
          enum:
            - low
            - medium
            - high
        reasons:
          type: array
          items:
            type: string
        matchedVariables:
          type: array
          items:
            type: string
        riskNotes:
          type: array
          items:
            type: string
        contentRelevance:
          type: number
          minimum: 0
          maximum: 1
        experienceSimilarity:
          type: number
          minimum: 0
          maximum: 1
        evidenceQuality:
          type: number
          minimum: 0
          maximum: 1
        personaReadiness:
          type: number
          minimum: 0
          maximum: 1
    AiPersona:
      type: object
      required:
        - enabled
        - personaId
        - displayName
        - label
        - openingLine
        - suggestedQuestions
        - boundary
        - grounding
      properties:
        enabled:
          type: boolean
        personaId:
          type: string
        displayName:
          type: string
        label:
          type: string
          example: 基于公开内容生成
        openingLine:
          type: string
        suggestedQuestions:
          type: array
          items:
            type: string
        boundary:
          type: string
          description: Must explain that the persona does not represent the original author.
          example: 这是基于知乎公开内容生成的经验回应，不代表作者本人。
        grounding:
          $ref: "#/components/schemas/PersonaGrounding"
    PersonaGrounding:
      type: object
      required:
        - personId
        - articleIds
        - evidenceRequired
      properties:
        personId:
          type: string
        articleIds:
          type: array
          items:
            type: string
        evidenceRequired:
          type: boolean
    PersonaIndex:
      type: object
      required:
        - personaId
        - personId
        - displayName
        - entryType
      properties:
        personaId:
          type: string
        personId:
          type: string
        displayName:
          type: string
        entryType:
          type: string
          enum:
            - chat
            - disabled
    DemoSection:
      type: object
      required:
        - id
        - type
        - title
        - cards
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - analysis
            - path_map
            - people_samples
            - ai_personas
            - article_reader
            - build_prompt
        title:
          type: string
        description:
          type: string
        cards:
          type: array
          items:
            $ref: "#/components/schemas/SectionCard"
    SectionCard:
      type: object
      required:
        - id
        - type
        - title
        - summary
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - analysis
            - person
            - path
            - persona
            - article
        title:
          type: string
        summary:
          type: string
        targetId:
          type: string
          description: References a path id, person id, persona id or article id.
    Block:
      type: object
      required:
        - type
        - content
      properties:
        type:
          type: string
          enum:
            - paragraph
            - quote
            - list
            - callout
        content:
          type: string
        source:
          $ref: "#/components/schemas/SearchSource"
    PersonaChatRequest:
      type: object
      required:
        - queryId
        - personId
        - personaId
        - message
      properties:
        queryId:
          type: string
        personId:
          type: string
        personaId:
          type: string
        message:
          type: string
          minLength: 1
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatHistoryMessage"
    ChatHistoryMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
    PersonaChatSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/PersonaChatData"
    PersonaChatData:
      type: object
      required:
        - messageId
        - personaId
        - personId
        - answer
        - answerType
        - citedArticleIds
        - evidence
        - followupQuestions
        - boundary
      properties:
        messageId:
          type: string
        personaId:
          type: string
        personId:
          type: string
        answer:
          type: string
          description: Grounded response based on public articles/evidence, not the author's own live reply.
        answerType:
          type: string
          enum:
            - grounded_summary
            - insufficient_evidence
            - mock_stub
        citedArticleIds:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ChatEvidence"
        followupQuestions:
          type: array
          items:
            type: string
        boundary:
          type: string
          example: 这是基于知乎公开内容生成的经验回应，不代表作者本人。
    ChatEvidence:
      type: object
      required:
        - articleId
        - text
        - sourceUrl
      properties:
        articleId:
          type: string
        text:
          type: string
        sourceUrl:
          type: string
    ResponseMeta:
      type: object
      required:
        - mode
        - generatedAt
      properties:
        mode:
          type: string
        generatedAt:
          type: string
          format: date-time
        traceId:
          type: string
        sourcePolicy:
          type: string
          description: Explains that AI is not a fact source and evidence is required.
        peopleCount:
          type: integer
          minimum: 0
        pathCount:
          type: integer
          minimum: 0
        llmEnabled:
          type: boolean
        zhihuKeyPresent:
          type: boolean
        latencyMs:
          type: integer
          minimum: 0
    DemoDebug:
      type: object
      additionalProperties: true
      properties:
        stubbed:
          type: boolean
        searchQueries:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
