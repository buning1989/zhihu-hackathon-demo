        sourceUrl:
          type: string
        publishedAt:
          type: string
        summary:
          type: string
        evidenceStatus:
          type: string
          enum:
            - llm_extracted
            - raw_snippet_only
        evidenceText:
          type: string
          description: Display evidence text, preferring evidence[0].text, then summary, then a text slice.
