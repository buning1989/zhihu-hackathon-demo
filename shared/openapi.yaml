    ZhihuRawSearchResponse:
      type: object
      additionalProperties: true
      properties:
        Code:
          oneOf:
            - type: integer
            - type: string
        Message:
          type: string
        Data:
          description: Raw upstream payload.
    ApiErrorResponse:
      type: object
      required:
        - success
        - error
