        - level
        - reasons
        - matchedVariables
        - riskNotes
        - contentRelevance
        - experienceSimilarity
        - evidenceQuality
        - personaReadiness
      properties:
        score:
          type: number
          minimum: 0
          maximum: 1
        level:
          type: string
          enum:
            - low
            - medium
            - high
        reasons:
          type: array
          items:
            type: string
        matchedVariables:
          type: array
          items:
            type: string
        riskNotes:
          type: array
          items:
            type: string
        contentRelevance:
          type: number
          minimum: 0
          maximum: 1
        experienceSimilarity:
          type: number
          minimum: 0
          maximum: 1
        evidenceQuality:
          type: number
          minimum: 0
          maximum: 1
        personaReadiness:
          type: number
          minimum: 0
          maximum: 1
    AiPersona:
      type: object
      required:
        - enabled
        - personaId
        - displayName
        - label
        - openingLine
        - suggestedQuestions
        - boundary
        - grounding
      properties:
        enabled:
          type: boolean
        canChat:
          type: boolean
          description: Final display gate for follow-up chat; false means keep the persona index but show 查看来源片段.
        evidenceStatus:
          type: string
          enum:
            - llm_extracted
            - raw_snippet_only
        displayLabel:
          type: string
        displayTradeoff:
          type: string
        personaId:
          type: string
        displayName:
          type: string
        label:
          type: string
          example: 基于公开内容生成
        openingLine:
          type: string
        suggestedQuestions:
          type: array
          items:
            type: string
        boundary:
          type: string
          description: Must explain that the persona does not represent the original author.
          example: 这是基于知乎公开内容生成的经验回应，不代表作者本人。
        grounding:
          $ref: "#/components/schemas/PersonaGrounding"
    PersonaGrounding:
      type: object
      required:
        - personId
        - articleIds
        - evidenceRequired
      properties:
        personId:
          type: string
        articleIds:
          type: array
          items:
            type: string
        evidenceRequired:
          type: boolean
    PersonaIndex:
      type: object
      required:
        - personaId
        - personId
        - displayName
        - entryType
      properties:
        personaId:
          type: string
        personId:
          type: string
        displayName:
          type: string
        canChat:
          type: boolean
        displayTier:
          type: string
          enum:
            - core
            - supplement
        evidenceStatus:
          type: string
          enum:
            - llm_extracted
            - raw_snippet_only
        displayLabel:
          type: string
        displayTradeoff:
          type: string
        entryType:
          type: string
          enum:
            - chat
            - disabled
        fitReason:
          type: string
          description: Optional explanation for showing this persona entry, grounded in matched content.
    DemoSection:
      type: object
      required:
        - id
        - type
        - title
        - cards
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - analysis
            - path_map
            - people_samples
            - ai_personas
            - article_reader
            - build_prompt
        title:
          type: string
        description:
          type: string
        cards:
          type: array
          items:
            $ref: "#/components/schemas/SectionCard"
    SectionCard:
      type: object
      required:
        - id
        - type
        - title
        - summary
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - analysis
            - person
            - path
            - persona
            - article
        title:
          type: string
        summary:
          type: string
        targetId:
          type: string
          description: References a path id, person id, persona id or article id.
    Block:
      type: object
      required:
        - type
        - content
      properties:
        type:
          type: string
          enum:
            - paragraph
            - quote
            - list
            - callout
        content:
          type: string
        source:
          $ref: "#/components/schemas/SearchSource"
    PersonaChatRequest:
      type: object
      required:
        - queryId
        - personId
        - personaId
        - message
      properties:
        queryId:
          type: string
        personId:
          type: string
        personaId:
          type: string
        message:
          type: string
          minLength: 1
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatHistoryMessage"
    ChatHistoryMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
    PersonaChatSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/PersonaChatData"
    PersonaChatData:
      type: object
      required:
        - messageId
        - personaId
        - personId
        - answer
        - answerType
        - citedArticleIds
        - evidence
        - followupQuestions
        - boundary
      properties:
        messageId:
          type: string
        personaId:
          type: string
        personId:
          type: string
        answer:
          type: string
          description: Grounded response based on public articles/evidence, not the author's own live reply.
        answerType:
          type: string
          enum:
            - grounded_summary
            - insufficient_evidence
            - mock_stub
        citedArticleIds:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ChatEvidence"
        followupQuestions:
          type: array
          items:
            type: string
        boundary:
          type: string
          example: 这是基于知乎公开内容生成的经验回应，不代表作者本人。
    ChatEvidence:
      type: object
      required:
        - articleId
        - text
        - sourceUrl
      properties:
        articleId:
          type: string
        text:
          type: string
        sourceUrl:
          type: string
    ResponseMeta:
      type: object
      required:
        - mode
        - generatedAt
      properties:
        mode:
          type: string
        generatedAt:
          type: string
          format: date-time
        traceId:
          type: string
        sourcePolicy:
          type: string
          description: Explains that AI is not a fact source and evidence is required.
        peopleCount:
          type: integer
          minimum: 0
        pathCount:
          type: integer
          minimum: 0
        llmEnabled:
          type: boolean
        zhihuKeyPresent:
          type: boolean
        latencyMs:
          type: integer
          minimum: 0
    DemoDebug:
      type: object
      additionalProperties: true
      properties:
        originalQuery:
          type: string
          description: Raw query received by POST /api/demo/search.
        normalizedQuery:
          type: string
          description: Normalized query used for deterministic path generation and cache keying.
        pathSource:
          type: string
          enum:
            - llm
            - rule
            - fallback
          description: Whether paths were written by LLM compose, deterministic rules, or fallback builder.
        composerFallbackTriggered:
          type: boolean
          description: True when the card composer LLM did not update path/people/persona text and deterministic fallback was preserved.
        pathDuplicateFound:
          type: boolean
          description: Whether lightweight path similarity checks found duplicate titles, summary prefixes, or diversity keys.
        pathDiversityCheck:
          type: object
          additionalProperties: true
          properties:
            duplicateFound:
              type: boolean
            duplicateTitleCount:
              type: integer
              minimum: 0
            duplicateSummaryPrefixCount:
              type: integer
              minimum: 0
            duplicateDiversityKeys:
              type: array
              items:
                type: string
            rewriteCount:
              type: integer
              minimum: 0
            mergeCount:
              type: integer
              minimum: 0
            notes:
              type: array
              items:
                type: string
        fallbackReason:
          type: string
          description: Why fallback/rule generation was used, when applicable.
        cacheHit:
          type: boolean
          description: True when the demo search response came from the normalizedQuery-aware memory cache.
        cacheKeyPreview:
          type: string
          description: Redacted/debug preview of the cache key; includes normalizedQuery.
        intentStage:
          $ref: "#/components/schemas/DemoDebugIntentStage"
        stubbed:
          type: boolean
        searchQueries:
          type: array
          description: Debug-only search recall plan generated by intent_expand.
          items:
            $ref: "#/components/schemas/DemoSearchQueryPlan"
        searchQueryResults:
          type: array
          description: Per-query recall counts from the real Zhihu search fan-out.
          items:
            allOf:
              - $ref: "#/components/schemas/DemoSearchQueryPlan"
              - type: object
                properties:
                  returnedCount:
                    type: integer
                    minimum: 0
                  error:
                    type: string
        mergedCandidateCount:
          type: integer
          minimum: 0
        dedupedCandidateCount:
          type: integer
          minimum: 0
        validCandidateCount:
          type: integer
          minimum: 0
        warnings:
          type: array
          items:
            type: string
        candidateQuality:
          type: array
          description: >
            Debug-only quality assessment for each recalled candidate. Shows
            why a candidate became core evidence or was downranked.
          items:
            $ref: "#/components/schemas/DemoCandidateQuality"
        finalCandidates:
          type: array
          description: Selected candidates after rerank/rule fallback, with task-2 fields used by the path extractor when available.
          items:
            type: object
            additionalProperties: true
            properties:
              candidateId:
                type: string
              title:
                type: string
              author:
                type: string
              matchedQuery:
                type: string
              queryType:
                type: string
              contentRole:
                type: string
              relationToUserIntent:
                type: string
              summaryAngle:
                type: string
              diversityKey:
                type: string
              keepReason:
                type: string
              sourceRefs:
                type: array
                items:
                  type: string
        experienceSummaryDebug:
          type: array
          description: >
            Debug-only LLM/fallback state for people[].experienceSummary. The
            fallbackSummary field is not intended for primary frontend display.
          items:
            $ref: "#/components/schemas/DemoExperienceSummaryDebug"
    DemoSearchQueryPlan:
      type: object
      required:
        - query
        - type
        - purpose
        - priority
      properties:
        query:
          type: string
        type:
          type: string
          enum:
            - original
            - real_experience
            - life_path
            - failure_review
            - decision_conflict
            - alternative_solution
        purpose:
          type: string
        priority:
          type: integer
          minimum: 1
          maximum: 6
    DemoCandidateQuality:
      type: object
      required:
        - candidateId
        - title
        - relevanceScore
        - qualityScore
        - experienceSignalScore
        - contentLength
        - filterReason
        - usedAsEvidence
      properties:
        candidateId:
          type: string
        sourceRefId:
          type: string
        title:
          type: string
        matchedQuery:
          type: string
        queryType:
          type: string
          enum:
            - original
            - real_experience
            - life_path
            - failure_review
            - decision_conflict
            - alternative_solution
        queryPurpose:
          type: string
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
        qualityScore:
          type: number
          minimum: 0
          maximum: 1
        experienceSignalScore:
          type: number
          minimum: 0
          maximum: 1
        contentLength:
          type: integer
          minimum: 0
        filterReason:
          type: string
        usedAsEvidence:
          type: boolean
        contentRole:
          type: string
        relationToUserIntent:
          type: string
        summaryAngle:
          type: string
        diversityKey:
          type: string
        keepReason:
          type: string
    DemoExperienceSummaryDebug:
      type: object
      required:
        - personId
        - status
        - source
        - reason
        - cacheHit
      properties:
        personId:
          type: string
        status:
          type: string
          enum:
            - ready
            - pending
            - failed
        source:
          type: string
          enum:
            - llm
            - fallback
            - none
        reason:
          type: string
        cacheHit:
          type: boolean
        fallbackSummary:
          type: string
          description: Rule/text fallback kept for debugging only; do not show as primary experienceSummary.
    DemoDebugIntentStage:
      type: object
      required:
        - mode
        - llmUsed
        - fallbackReason
      properties:
        mode:
          type: string
          enum:
            - rule
            - llm
            - hybrid
            - fallback
        llmUsed:
          type: boolean
        provider:
          type: string
          description: LLM provider for the intent/planning stage when known.
        model:
          type: string
          description: LLM model for the intent/planning stage when known.
        fallbackReason:
          type: string
        intentSource:
          type: string
          enum:
            - rule
            - llm
        focusTagsSource:
          type: string
          enum:
            - rule
            - llm
