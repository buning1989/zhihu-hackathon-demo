<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生样本库 | Demo</title>
  <style>
    :root {
      --bg: #fbf7ef;
      --bg-2: #f7f1e7;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: #ffffff;
      --line: rgba(38, 35, 31, 0.08);
      --line-strong: rgba(38, 35, 31, 0.16);
      --text: #26231f;
      --muted: #6f685f;
      --faint: #9a9287;
      --ink: #26231f;
      --paper: #fffdf8;
      --paper-2: #ffffff;
      --warm: #d7a14a;
      --warm-2: #f2c86b;
      --accent-warm: #d89a45;
      --accent-warm-soft: #fff1c7;
      --blue: #1772f6;
      --green: #3f8a71;
      --green-soft: #e6f1ec;
      --shadow: 0 16px 44px rgba(52, 43, 32, 0.07);
      --shadow-card: 0 22px 70px rgba(52, 43, 32, 0.1);
      --ease: cubic-bezier(0.2, 0.82, 0.2, 1);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 1180px;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 244, 219, 0.72), transparent 38%),
        linear-gradient(180deg, #fbf7ef 0%, #f7f1e7 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body[data-page="loading"],
    body[data-page="paths"] {
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: #ffffff;
      --line: rgba(38, 35, 31, 0.08);
      --line-strong: rgba(38, 35, 31, 0.16);
      --text: #26231f;
      --muted: #6f685f;
      --faint: #9a9287;
      --ink: #26231f;
      --shadow: 0 16px 44px rgba(52, 43, 32, 0.07);
      color-scheme: light;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      position: relative;
      z-index: 2;
      min-height: 100vh;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 52px;
      pointer-events: none;
    }

    .brand,
    .nav-pill {
      pointer-events: auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 0;
      color: var(--text);
      background: transparent;
      font-weight: 850;
      letter-spacing: 0;
    }

    .brand-mark {
      position: relative;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fffdf8;
      color: var(--accent-warm);
      box-shadow: 0 12px 28px rgba(52, 43, 32, 0.06);
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      width: 10px;
      height: 10px;
      transform: translateX(-50%);
      border: 2px solid currentColor;
      border-radius: 50%;
      background: #fff;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 19px;
      height: 13px;
      transform: translateX(-50%);
      border: 2px solid currentColor;
      border-bottom: 0;
      border-radius: 13px 13px 0 0;
      background: rgba(255, 241, 199, 0.72);
    }

    .brand span:last-child {
      font-size: 18px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .nav-pill {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.64);
      backdrop-filter: blur(16px);
      transition: 180ms ease;
    }

    .nav-pill:hover {
      color: var(--text);
      border-color: rgba(216, 154, 69, 0.28);
      background: #fff;
      transform: translateY(-1px);
    }

    .auth-slot {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 38px;
    }

    .auth-avatar-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .avatar-button {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      padding: 0;
      overflow: hidden;
      border: 1px solid rgba(38, 35, 31, 0.12);
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(52, 43, 32, 0.08);
    }

    .avatar-button img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-initial {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      color: #ffffff;
      background: var(--blue);
      font-size: 14px;
      font-weight: 900;
    }

    .avatar-skeleton {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(38, 35, 31, 0.12);
      border-top-color: var(--accent-warm);
      border-radius: 50%;
      animation: spin 760ms linear infinite;
    }

    .auth-avatar-popover {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 148px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: 160ms ease;
    }

    .auth-avatar-popover strong,
    .auth-avatar-popover span {
      display: block;
      line-height: 1.5;
      white-space: nowrap;
    }

    .auth-avatar-popover span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .auth-avatar-wrap:hover .auth-avatar-popover,
    .auth-avatar-wrap:focus-within .auth-avatar-popover {
      opacity: 1;
      transform: translateY(0);
    }

    body[data-page="loading"] .nav-pill,
    body[data-page="paths"] .nav-pill {
      color: var(--muted);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    body[data-page="loading"] .nav-pill:hover,
    body[data-page="paths"] .nav-pill:hover {
      color: var(--text);
      border-color: rgba(216, 154, 69, 0.32);
      background: #fff;
    }

    .screen {
      position: relative;
      min-height: 100vh;
      padding: 92px 52px 42px;
      overflow: hidden;
      animation: screenIn 620ms var(--ease) both;
    }

    .screen.home {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-stack {
      position: relative;
      z-index: 10;
      width: min(1040px, 100%);
      margin: 0 auto;
      text-align: center;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(58px, 8vw, 126px);
      line-height: 0.95;
      color: var(--text);
      font-weight: 850;
    }

    h2 {
      font-size: 42px;
      line-height: 1.12;
      font-weight: 900;
    }

    p {
      margin: 0;
    }

    .lead {
      margin: 22px auto 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 24px;
      line-height: 1.78;
    }

    .hand-underline {
      position: relative;
      display: inline-block;
    }

    .hand-underline::after {
      content: "";
      position: absolute;
      left: 2%;
      right: 0;
      bottom: -8px;
      height: 12px;
      border-bottom: 7px solid rgba(216, 154, 69, 0.58);
      border-radius: 50%;
      transform: rotate(-1.5deg);
      filter: drop-shadow(0 8px 14px rgba(216, 154, 69, 0.12));
    }

    .question-card {
      position: relative;
      width: min(860px, 100%);
      margin: 34px auto 0;
      padding: 0;
      border: 1px solid rgba(42, 36, 28, 0.12);
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(52, 43, 32, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .question-card:focus-within {
      border-color: rgba(216, 154, 69, 0.24);
      box-shadow: 0 24px 70px rgba(52, 43, 32, 0.1), 0 0 0 5px rgba(255, 241, 199, 0.28);
      background: rgba(255, 255, 255, 0.9);
    }

    .question-input {
      display: block;
      width: 100%;
      min-height: 210px;
      resize: none;
      padding: 30px 96px 34px 32px;
      border: 0;
      outline: 0;
      border-radius: 28px;
      color: var(--text);
      background: transparent;
      box-shadow: none;
      font-size: 21px;
      line-height: 1.75;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .question-input:focus {
      box-shadow: none;
    }

    .query-placeholder {
      position: absolute;
      left: 32px;
      top: 30px;
      right: 96px;
      z-index: 1;
      color: rgba(38, 35, 31, 0.34);
      font-size: 19px;
      font-weight: 400;
      line-height: 1.75;
      text-align: left;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .question-card.is-editing .query-placeholder,
    .question-card.has-value .query-placeholder {
      opacity: 0;
      transform: translateY(-4px);
    }

    .send-query {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 3;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 0;
      border-radius: 50%;
      color: #ffffff;
      background: linear-gradient(135deg, #e5a151, #c97a32);
      box-shadow: 0 18px 38px rgba(216, 154, 69, 0.24);
      font-size: 28px;
      line-height: 1;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .send-query:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
      box-shadow: 0 22px 46px rgba(216, 154, 69, 0.28);
    }

    .hint {
      margin-top: 12px;
      color: var(--faint);
      font-size: 14px;
    }

    .primary,
    .secondary,
    .text-button {
      border: 1px solid transparent;
      transition: transform 180ms ease, filter 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      padding: 14px 26px;
      border-radius: 999px;
      color: #3f2b0f;
      background: linear-gradient(135deg, var(--accent-warm-soft), #f0c977);
      font-weight: 900;
      box-shadow: 0 18px 40px rgba(216, 154, 69, 0.18);
    }

    .primary.warm {
      color: #3f2b0f;
      background: linear-gradient(135deg, var(--accent-warm-soft), #f0c977);
      box-shadow: 0 18px 40px rgba(216, 154, 69, 0.18);
    }

    .primary:hover,
    .secondary:hover,
    .text-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 17px;
      border: 1px solid rgba(216, 154, 69, 0.28);
      border-radius: 999px;
      color: #6f5a2b;
      background: transparent;
      font-weight: 800;
    }

    .secondary.dark {
      color: #6f5a2b;
      border-color: rgba(216, 154, 69, 0.28);
      background: transparent;
    }

    .text-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 15px;
      border: 1px solid rgba(216, 154, 69, 0.28);
      border-radius: 999px;
      color: #6f5a2b;
      background: transparent;
      font-weight: 800;
    }

    .secondary:hover,
    .text-button:hover {
      color: #3f2b0f;
      border-color: rgba(216, 154, 69, 0.46);
      background: rgba(255, 241, 199, 0.22);
    }

    .action-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .crowd-stage {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30vh;
      min-height: 220px;
      max-height: 285px;
      z-index: 4;
      overflow: hidden;
      pointer-events: none;
      border-top: 1px solid rgba(38, 35, 31, 0.04);
      background:
        linear-gradient(180deg, rgba(251, 247, 239, 0), rgba(255, 255, 255, 0.26) 22%, rgba(247, 241, 231, 0.54) 100%);
      mask-image: linear-gradient(to bottom, transparent 0, #000 13%, #000 100%);
    }

    .crowd-row {
      position: absolute;
      left: 0;
      bottom: var(--bottom);
      display: flex;
      align-items: flex-end;
      gap: var(--gap);
      width: max-content;
      opacity: var(--opacity);
      filter: blur(var(--blur));
      transform: translateX(0);
      animation: crowdWalk var(--speed) linear infinite;
    }

    .crowd-row.reverse {
      animation-direction: reverse;
    }

    .walker {
      position: relative;
      width: var(--w);
      height: var(--h);
      flex: 0 0 auto;
      animation: bob 2.7s ease-in-out infinite;
      animation-delay: var(--delay);
      transform-origin: 50% 100%;
    }

    .walker img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: saturate(0.68) contrast(0.92) drop-shadow(0 12px 18px rgba(52, 43, 32, 0.11));
    }

    .walker .head {
      position: absolute;
      left: 50%;
      top: 0;
      width: calc(var(--w) * 0.66);
      height: calc(var(--w) * 0.72);
      transform: translateX(-50%);
      border: 4px solid #fff;
      border-radius: 48% 46% 54% 44%;
      background: var(--face);
      box-shadow: 0 0 22px rgba(255, 255, 255, 0.18);
    }

    .walker .head::before,
    .walker .head::after {
      content: "";
      position: absolute;
      top: 36%;
      width: 6px;
      height: 8px;
      border-radius: 50%;
      background: #050505;
    }

    .walker .head::before {
      left: 30%;
    }

    .walker .head::after {
      right: 30%;
    }

    .walker .hair {
      position: absolute;
      left: 50%;
      top: -7px;
      width: calc(var(--w) * 0.72);
      height: calc(var(--w) * 0.34);
      transform: translateX(-50%) rotate(var(--hair-rot));
      border-radius: 52% 48% 40% 44%;
      background: #050505;
      border: 3px solid #fff;
      border-bottom: 0;
    }

    .walker .body {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: calc(var(--w) * 0.84);
      height: calc(var(--h) * 0.52);
      transform: translateX(-50%);
      border: 4px solid #fff;
      border-bottom: 0;
      border-radius: 42% 42% 0 0;
      background: var(--shirt);
      box-shadow: inset 0 0 0 1px rgba(38, 35, 31, 0.14);
    }

    .walker .body::before,
    .walker .body::after {
      content: "";
      position: absolute;
      top: 14%;
      width: 4px;
      height: 56%;
      border-radius: 4px;
      background: #fff;
      opacity: 0.8;
    }

    .walker .body::before {
      left: 26%;
      transform: rotate(-10deg);
    }

    .walker .body::after {
      right: 26%;
      transform: rotate(10deg);
    }

    .walker .nose {
      position: absolute;
      left: 50%;
      top: 46%;
      width: 8px;
      height: 14px;
      transform: translateX(-50%) rotate(8deg);
      border-radius: 70% 30% 50% 50%;
      background: var(--warm-2);
    }

    .home .center-stack {
      padding-top: 0;
      transform: translateY(24px);
    }

    .home h1 {
      font-size: clamp(26px, 2.8vw, 40px);
      line-height: 1.18;
      white-space: nowrap;
    }

    .home .lead {
      margin-top: 18px;
      font-size: 22px;
    }

    .home .question-card {
      margin-top: 42px;
    }

    .home .question-input {
      min-height: 210px;
    }

    .home-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 13px;
      border: 1px solid rgba(216, 154, 69, 0.22);
      border-radius: 999px;
      color: var(--accent-warm);
      background: rgba(255, 241, 199, 0.72);
      font-size: 14px;
      font-weight: 800;
    }

    .home-bottom-copy {
      display: none;
    }

    .loading {
      min-height: 100vh;
      padding-bottom: 250px;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 244, 219, 0.72), transparent 38%),
        linear-gradient(180deg, #fbf7ef 0%, #f7f1e7 100%);
    }

    .loading-panel {
      position: relative;
      z-index: 12;
      width: min(860px, 100%);
      margin: 8vh auto 0;
      padding: 32px;
      border: 1px solid rgba(38, 35, 31, 0.08);
      border-radius: 28px;
      text-align: left;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 22px 70px rgba(52, 43, 32, 0.1);
      backdrop-filter: blur(10px);
    }

    .loading-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .loading-title h1 {
      font-size: 40px;
      line-height: 1.12;
    }

    .pulse-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--warm);
      box-shadow: 0 0 0 0 rgba(244, 211, 94, 0.6);
      animation: pulse 1.6s ease infinite;
    }

    .fingerprint-steps {
      display: grid;
      gap: 12px;
    }

    .fingerprint-step {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
      opacity: 0.48;
      transform: translateY(8px);
      transition: opacity 260ms ease, transform 260ms ease, border-color 260ms ease;
      line-height: 1.68;
    }

    .fingerprint-step.is-active,
    .fingerprint-step.is-done {
      opacity: 1;
      transform: translateY(0);
      border-color: rgba(215, 161, 74, 0.24);
      background: rgba(255, 253, 248, 0.88);
    }

    .fingerprint-step strong {
      color: var(--text);
    }

    .loading .crowd-stage {
      top: auto;
      bottom: 0;
      height: 235px;
      min-height: 235px;
      max-height: none;
      border-top: 0;
      background:
        linear-gradient(180deg, rgba(251, 247, 239, 0), rgba(255, 255, 255, 0.24) 22%, rgba(247, 241, 231, 0.64) 100%);
    }

    .loading .walker img {
      filter: saturate(0.66) contrast(0.92) drop-shadow(0 14px 20px rgba(52, 43, 32, 0.12));
    }

    .paths-screen {
      padding-top: 72px;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 244, 219, 0.72), transparent 38%),
        linear-gradient(180deg, #fbf7ef 0%, #f7f1e7 100%);
    }

    .paths-screen.has-expanded {
      overflow: visible;
      padding-bottom: 76px;
    }

    .paths-copy {
      position: relative;
      z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      animation: fadeUp 420ms var(--ease) both;
    }

    .paths-copy h1 {
      font-size: 46px;
      line-height: 1.08;
    }

    .paths-copy .lead {
      margin-top: 14px;
      font-size: 20px;
      line-height: 1.62;
    }

    .expanded-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 28px;
    }

    .expanded-heading h1 {
      font-size: 50px;
      line-height: 1.02;
    }

    .expanded-heading p {
      max-width: 760px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.75;
    }

    .fingerprint-mini {
      display: inline-flex;
      gap: 10px;
      margin-top: 12px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.64);
    }

    .path-showcase {
      position: relative;
      z-index: 10;
      display: grid;
      margin: 42px auto 0;
    }

    .path-showcase.path-count-2 {
      grid-template-columns: repeat(2, minmax(340px, 400px));
      justify-content: center;
      gap: 24px;
      width: min(900px, 100%);
    }

    .path-showcase.path-count-3 {
      grid-template-columns: repeat(3, minmax(300px, 360px));
      justify-content: center;
      gap: 22px;
      width: min(1120px, 100%);
    }

    .path-showcase.path-count-4 {
      grid-template-columns: repeat(2, minmax(340px, 420px));
      justify-content: center;
      gap: 24px;
      width: min(940px, 100%);
    }

    .path-showcase.path-count-5 {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      width: min(1180px, 100%);
    }

    .path-showcase.is-expanded {
      display: block;
      width: min(1280px, calc(100vw - 96px));
      margin: 42px auto 0;
      animation: fadeUp 440ms var(--ease) both;
    }

    function toArray(value) {
      if (Array.isArray(value)) return value;
      if (value === undefined || value === null || value === "") return [];
      if (typeof value === "string") return value.split(/[、,，/]/).map((item) => item.trim()).filter(Boolean);
      return [value];
    }

    function textOf(value, fallback = "") {
      if (value === undefined || value === null) return fallback;
      return String(value);
    }

    function isGeneratedSampleLabel(value) {
      const text = textOf(value).trim();
      return /^样本\s*\d+$/i.test(text)
        || /^公开回答样本\s*[A-Za-z0-9]+(?:\s*[·。].*)?$/i.test(text)
        || /^知乎回答样本\s*[A-Za-z0-9]*(?:\s*[·。].*)?$/i.test(text)
        || /^基于公开回答整理的.+样本(?:\s*[·。].*)?$/i.test(text);
    }

    function cleanGeneratedSampleLabel(value) {
      const text = textOf(value).trim();
      return isGeneratedSampleLabel(text) ? "" : text;
    }

    function numberOf(value, fallback = 0) {
      const next = Number(value);
      return Number.isFinite(next) ? next : fallback;
    }

    function slugify(value, fallback) {
      const text = textOf(value).trim();
      if (!text) return fallback;
      return text
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^\w\u4e00-\u9fa5-]/g, "")
        .slice(0, 32) || fallback;
    }

    function normalizePath(item = {}, index = 0) {
      const name = item.name || item.title || item.label || item.pathName || `路径 ${index + 1}`;
      return {
        id: textOf(item.id || item.pathId || item.path_id || item.routeId || item.route_id || item.slug || slugify(name, `path_${index + 1}`)),
        name: textOf(name),
        count: numberOf(item.count ?? item.peopleCount ?? item.people_count ?? item.sampleCount ?? item.sample_count ?? item.total ?? item.numPeople, 0),
        desc: textOf(item.desc || item.description || item.summary || item.reason || item.explanation || item.short, ""),
        short: textOf(item.short || item.subtitle || item.tagline || item.summary || item.description || ""),
        fitReason: textOf(item.fitReason || item.fit_reason || ""),
        personRefs: toArray(item.personRefs || item.person_refs || item.peopleRefs || item.people_refs || item.personIds || item.person_ids || item.peopleIds || item.people_ids).map(String),
        sourceRefs: normalizeSourceRefs(item.sourceRefs || item.source_refs || item.sources),
        evidenceIds: toArray(item.evidenceIds || item.evidence_ids).map(String)
      };
    }

    function pathPersonRefCount(item = {}) {
      return toArray(item.personRefs || item.person_refs || item.peopleRefs || item.people_refs || item.personIds || item.person_ids || item.peopleIds || item.people_ids).length;
    }

    function pathPeople(pathId, limit = Infinity) {
      return peopleForPath(pathId).slice(0, limit);
    }

    function normalizeTimeline(value) {
      return toArray(value).map((item) => {
        if (Array.isArray(item)) return [textOf(item[0]), textOf(item[1])];
        return [textOf(item.date || item.time || item.year || item.at), textOf(item.event || item.text || item.description || item.title)];
      }).filter((item) => item[0] || item[1]);
    }

    function normalizeTextBlocks(value) {
      return toArray(value).map((item) => {
        if (Array.isArray(item)) return item.map((part) => textOf(part)).filter(Boolean).join(" ");
        if (typeof item === "object" && item) return textOf(item.text || item.content || item.summary || item.description || item.title);
        return textOf(item);
      }).filter(Boolean);
    }

    function normalizeSourceRefs(value) {
      return toArray(value).map((item, index) => {
        if (typeof item === "string") return item;
        return {
          id: textOf(item.id || item.sourceRefId || item.source_ref_id || `source_${index + 1}`),
          title: textOf(item.title || item.name || item.label || item.id || `来源 ${index + 1}`),
          sourceName: textOf(item.sourceName || item.source_name || item.provider || item.type || ""),
          url: textOf(item.url || item.sourceUrl || item.source_url || item.link || "")
        };
      });
    }

    function normalizeEvidence(value) {
      return toArray(value).map((item, index) => {
        if (typeof item === "string") return { id: `evidence_${index + 1}`, label: "", text: item, sourceRefId: "", sourceUrl: "" };
        return {
          id: textOf(item.id || item.evidenceId || item.evidence_id || `evidence_${index + 1}`),
          label: textOf(item.label || item.title || item.type || ""),
          text: textOf(item.text || item.content || item.summary || item.description || ""),
          sourceRefId: textOf(item.sourceRefId || item.source_ref_id || item.sourceId || item.source_id || ""),
          sourceUrl: textOf(item.sourceUrl || item.source_url || item.url || "")
        };
      }).filter((item) => item.id || item.text);
    }

    function normalizeArticle(item, index = 0, person = {}) {
      if (typeof item === "string") {
        return {
          id: `article_${index + 1}`,
          title: item,
          author: person.name || "",
          sourceName: "知乎回答 / 文章",
          sourceUrl: "",
          publishedAt: "",
          summary: "",
          evidence: [],
          sourceRefs: [],
          body: index === 0 ? normalizeTextBlocks(person.articleBody) : []
        };
      }
      return {
        id: textOf(item.id || item.articleId || item.article_id || `article_${index + 1}`),
        title: textOf(item.title || item.name || `原文 ${index + 1}`),
        author: textOf(item.author || item.authorName || item.author_name || person.name || ""),
        sourceName: textOf(item.sourceName || item.source || item.contentType || item.type || "知乎回答 / 文章"),
        sourceUrl: textOf(item.sourceUrl || item.source_url || item.url || item.link || ""),
        publishedAt: textOf(item.publishedAt || item.published_at || item.createdAt || item.created_at || ""),
        summary: textOf(item.summary || item.excerpt || ""),
        evidence: normalizeEvidence(item.evidence || item.evidences),
        sourceRefs: normalizeSourceRefs(item.sourceRefs || item.source_refs || item.sources),
        body: normalizeTextBlocks(item.body || item.paragraphs || item.content || item.text)
      };
    }

    function normalizePerson(item = {}, index = 0, fallbackPathId = "") {
      const nameCandidates = [item.name, item.nickname, item.displayName, item.display_name, item.authorName, item.author_name].map((value) => textOf(value).trim()).filter(Boolean);
      const name = nameCandidates.find((value) => !isGeneratedSampleLabel(value)) || cleanGeneratedSampleLabel(nameCandidates[0]) || `知乎用户 ${index + 1}`;
      const pathName = item.pathName || item.path_name || item.path?.name;
      const derivedPathId = pathName ? slugify(pathName, `path_${index + 1}`) : "";
      const matchedPath = pathName ? paths.find((path) => path.name === pathName) : null;
      const pathId = item.pathId || item.path_id || item.routeId || item.route_id || item.path?.id || matchedPath?.id || derivedPathId || fallbackPathId || paths[0]?.id || "";
      const aiPersona = item.aiPersona || item.ai_persona || item.persona || {};
      const match = item.match || {};
      const matchReasons = toArray(match.reasons || match.reason || item.matchReasons || item.match_reasons);
      const overlaps = toArray(item.overlaps || item.similarities || item.reasons || matchReasons);
      const fitReason = textOf(item.fitReason || item.fit_reason || match.fitReason || match.fit_reason || "");
      const pathDesc = item.pathDesc || item.path_desc || item.path?.desc || item.path?.description;
      const normalized = {
        id: textOf(item.id || item.personId || item.person_id || item.authorId || item.author_id || slugify(name, `person_${index + 1}`)),
        name: textOf(name),
        pathId: textOf(pathId),
        pathName: textOf(pathName || matchedPath?.name || ""),
        pathDesc: textOf(pathDesc || ""),
        role: textOf(item.role || item.identity || item.bioTitle || item.bio_title || item.occupation || "知乎用户"),
        badge: textOf(item.badge || item.tagline || item.keyExperience || item.key_experience || item.subtitle || item.oneLine || item.summary || ""),
        gender: textOf(item.gender || item.sex || item.demographic?.gender || "未知"),
        avatar: textOf(item.avatar || item.avatarUrl || item.avatar_url || item.image || item.imageUrl || crowdPeepIds[index % crowdPeepIds.length]),
        oneLine: textOf(item.oneLine || item.one_line || item.summary || item.cardSummary || item.card_summary || item.badge || ""),
        who: textOf(item.who || item.bio || item.intro || item.profile || item.description || item.authorSummary || ""),
        overlaps: overlaps.length ? overlaps : toArray(fitReason),
        timeline: normalizeTimeline(item.timeline || item.events),
        lesson: textOf(item.lesson || item.takeaway || item.keyLesson || item.key_lesson || item.conclusion || ""),
        fitReason,
        match,
        sourceRefs: normalizeSourceRefs(item.sourceRefs || item.source_refs || item.sources),
        evidenceIds: toArray(item.evidenceIds || item.evidence_ids).map(String),
        personaId: textOf(aiPersona.personaId || aiPersona.persona_id || item.personaId || item.persona_id || ""),
        personaDisplayName: textOf(aiPersona.displayName || aiPersona.display_name || item.personaDisplayName || item.persona_display_name || ""),
        personaLabel: textOf(aiPersona.label || aiPersona.personaType || aiPersona.persona_type || item.personaLabel || ""),
        personaOpeningLine: textOf(aiPersona.openingLine || aiPersona.opening_line || aiPersona.intro || item.personaOpeningLine || ""),
        boundaryNotice: textOf(aiPersona.boundary || aiPersona.boundaryNotice || aiPersona.boundary_notice || item.boundaryNotice || item.boundary_notice || ""),
        suggestedQuestions: toArray(aiPersona.suggestedQuestions || aiPersona.suggested_questions || item.suggestedQuestions || item.suggested_questions).map(String),
        personaSourceRefs: normalizeSourceRefs(aiPersona.grounding?.sourceRefs || aiPersona.grounding?.source_refs || aiPersona.sourceRefs || aiPersona.source_refs),
        articles: [],
        raw: item
      };
      normalized.articles = toArray(item.articles || item.posts || item.contents || item.sources).map((article, articleIndex) => normalizeArticle(article, articleIndex, { ...item, ...normalized }));
      if (!normalized.articles.length && (item.articleBody || item.content || item.text)) {
        normalized.articles = [normalizeArticle({
          title: item.articleTitle || item.title || `${normalized.name} 的公开分享`,
          body: item.articleBody || item.content || item.text,
          sourceUrl: item.sourceUrl || item.url
        }, 0, normalized)];
      }
      if (!normalized.sourceRefs.length) {
        normalized.sourceRefs = normalizeSourceRefs(normalized.articles.flatMap((article) => article.sourceRefs?.length ? article.sourceRefs : article.sourceUrl ? [{ title: article.title, sourceName: article.sourceName, url: article.sourceUrl }] : []));
      }
      if (!normalized.personaSourceRefs.length) normalized.personaSourceRefs = normalized.sourceRefs;
      return normalized;
    }

    function normalizeSearchItemAsPerson(item = {}, index = 0, pathId = "") {
      const author = item.author || {};
      const source = item.source || {};
      const evidence = item.evidence || {};
      const title = textOf(item.title || item.name || item.text || `知乎内容 ${index + 1}`);
      const excerpt = textOf(item.text || evidence.text || item.summary || "");
      const sourceUrl = textOf(item.url || source.url || evidence.source?.url || "");
      const authorName = textOf(author.name || item.authorName || item.author_name || `知乎用户 ${index + 1}`, `知乎用户 ${index + 1}`);
      const profileUrl = textOf(author.profileUrl || author.profile_url || author.url || author.homepage || "");
      return normalizePerson({
        id: item.personId || item.person_id || item.authorId || item.author_id || `search_person_${item.id || index + 1}`,
        name: authorName,
        pathId,
        role: author.badgeText || author.badge || item.type || "知乎用户",
        badge: title,
        avatar: author.avatar || item.avatar || "",
        profileUrl,
        oneLine: excerpt || title,
        who: excerpt || "这位知友在知乎公开内容里分享过与当前问题相关的经历。",
        overlaps: [
          "TA 的公开内容与当前问题关键词相关",
          "TA 的回答可作为真实经历入口继续阅读"
        ],
        timeline: [
          { date: "知乎公开内容", event: title }
        ],
        articles: [{
          id: item.id || `search_article_${index + 1}`,
          title,
          author: authorName,
          sourceName: item.type ? `知乎${item.type}` : "知乎内容",
          sourceUrl,
          summary: excerpt,
          body: excerpt ? [excerpt] : []
        }],
        raw: item
      }, index, pathId);
    }

    function mergePersonaIndex(nextPeople, personasValue) {
      const personaEntries = toArray(personasValue);
      if (!personaEntries.length) return nextPeople;
      const byPersonId = new Map();
      personaEntries.forEach((persona) => {
        const personId = textOf(persona.personId || persona.person_id || persona.personRef || persona.person_ref || persona.peopleId || persona.people_id || "");
        if (personId) byPersonId.set(personId, persona);
      });
      return nextPeople.map((person) => {
        const persona = byPersonId.get(person.id);
        if (!persona) return person;
        return {
          ...person,
          personaId: person.personaId || textOf(persona.personaId || persona.persona_id || persona.id || ""),
          personaDisplayName: person.personaDisplayName || textOf(persona.displayName || persona.display_name || persona.name || ""),
          personaLabel: person.personaLabel || textOf(persona.label || persona.personaType || persona.persona_type || ""),
          personaOpeningLine: person.personaOpeningLine || textOf(persona.openingLine || persona.opening_line || persona.intro || ""),
          boundaryNotice: person.boundaryNotice || textOf(persona.boundary || persona.boundaryNotice || persona.boundary_notice || ""),
          suggestedQuestions: person.suggestedQuestions.length ? person.suggestedQuestions : toArray(persona.suggestedQuestions || persona.suggested_questions).map(String),
          personaSourceRefs: person.personaSourceRefs.length ? person.personaSourceRefs : normalizeSourceRefs(persona.sourceRefs || persona.source_refs)
        };
      });
    }

    function getResponseBody(payload) {
      return payload?.data?.result || payload?.data || payload?.result || payload;
    }

    function normalizeAnalysisSteps(value, query) {
      const raw = value?.steps || value?.analysisSteps || value?.analysis_steps || value;
      const steps = toArray(raw).map((step) => {
        if (Array.isArray(step)) return { title: textOf(step[0]), text: textOf(step[1]) };
        if (typeof step === "string") return { title: "分析", text: step };
        const detail = textOf(step.text || step.content || step.desc || step.description);
        return {
          title: textOf(step.title || step.name || step.label),
          text: detail
        };
      }).filter((step) => step.title || step.text);
      return steps.length ? steps : defaultAnalysisSteps(query);
    }

    function normalizeSearchResponse(payload, query) {
      const body = getResponseBody(payload) || {};
      const backendSucceeded = payload?.success === true || body?.success === true;
      const rawPaths = toArray(body.paths || body.routes || body.directions || body.pathways);
      let nextPaths = rawPaths.map(normalizePath);
      const searchItems = toArray(body.items);
      const nestedPeople = [];
      rawPaths.forEach((path, pathIndex) => {
        const normalizedPath = nextPaths[pathIndex] || normalizePath(path, pathIndex);
        toArray(path.people || path.samples || path.personas || path.authors).forEach((person) => nestedPeople.push({ person, pathId: normalizedPath.id }));
      });

      if (!backendSucceeded && !nextPaths.length && searchItems.length) {
        nextPaths = mockPaths.map((path) => normalizePath(path));
      }

      const previousPaths = paths;
      if (nextPaths.length) paths = nextPaths;
      let nextPeople = [
        ...toArray(body.people || body.samples || body.personas || body.authors).map((person, index) => normalizePerson(person, index)),
        ...nestedPeople.map(({ person, pathId }, index) => normalizePerson(person, index, pathId)),
        ...searchItems.map((item, index) => normalizeSearchItemAsPerson(item, index, nextPaths[index % Math.max(nextPaths.length, 1)]?.id || mockPaths[index % mockPaths.length]?.id || "search"))
      ];
      nextPeople = mergePersonaIndex(nextPeople, body.personas);
      paths = previousPaths;

      if (!nextPaths.length && nextPeople.length) {
        nextPaths = buildPathsFromPeople(nextPeople);
      }

      if (nextPaths.length) {
        const peopleCountByPath = new Map();
        nextPeople.forEach((person) => {
          if (!person.pathId) return;
          peopleCountByPath.set(person.pathId, (peopleCountByPath.get(person.pathId) || 0) + 1);
        });
        nextPaths = nextPaths.map((path, index) => ({
          ...path,
          count: pathPersonRefCount(rawPaths[index]) || peopleCountByPath.get(path.id) || path.count
        }));
      }

      if (!nextPaths.length || !nextPeople.length) {
        if (backendSucceeded) {
          return {
            queryId: textOf(body.queryId || body.query_id || body.id || ""),
            query: textOf(body.query || body.question || query),
            analysisSteps: normalizeAnalysisSteps(body.analysis || body, query),
            focusTags: toArray(body.analysis?.focusTags || body.analysis?.focus_tags || body.focusTags || body.focus_tags || body.tags).map(String),
            paths: sortPathsByCount(nextPaths),
            people: nextPeople
          };
        }
        if (!API_CONFIG.useMockFallback) throw new Error("后端返回缺少 paths 或 people");
        return normalizeSearchResponse({
          queryId: "mock_query",
          analysis: { steps: defaultAnalysisSteps(query), focusTags: state.focusTags },
          paths: mockPaths,
          people: mockPeople
        }, query);
      }

      return {
        queryId: textOf(body.queryId || body.query_id || body.id || ""),
        query: textOf(body.query || body.question || query),
        analysisSteps: normalizeAnalysisSteps(body.analysis || body, query),
        focusTags: toArray(body.analysis?.focusTags || body.analysis?.focus_tags || body.focusTags || body.focus_tags || body.tags).map(String),
        paths: sortPathsByCount(nextPaths),
        people: nextPeople
      };
    }

    function normalizeChatResponse(payload) {
      const body = getResponseBody(payload) || {};
      return {
        reply: textOf(body.reply || body.content || body.message || body.messages?.at?.(-1)?.content || "")
      };
    }

    function chatHistoryMessages(messages) {
      return messages
        .filter((message) => message.role === "user" || message.role === "ai" || message.role === "assistant")
        .map((message) => ({
          role: message.role === "user" ? "user" : "assistant",
          content: message.text
        }));
    }

    function fallbackChatPayload(person) {
      return {
        reply: getPersonaReply(person)
      };
    }

    function sortPathsByCount(list) {
      return [...list].sort((a, b) => numberOf(b.count, 0) - numberOf(a.count, 0));
    }

    function buildPathsFromPeople(peopleList = []) {
      const map = new Map();
      peopleList.forEach((person) => {
        const key = textOf(person.pathId || person.pathName || person.raw?.pathName || person.raw?.path_name || "similar");
        if (!map.has(key)) {
          map.set(key, normalizePath({
            id: key,
            name: person.pathName || person.raw?.pathName || person.raw?.path_name || "相似经历",
            count: 0,
            desc: person.pathDesc || person.raw?.pathDesc || person.raw?.path_desc || "这些人都在类似处境下做过选择。",
            personRefs: []
          }));
        }
        const group = map.get(key);
        group.count += 1;
        if (person.id && !group.personRefs.includes(person.id)) group.personRefs.push(person.id);
      });
      return Array.from(map.values());
    }

    function apiUrl(path) {
      if (/^https?:\/\//.test(String(path))) return String(path);
      return new URL(path, API_CONFIG.apiBase).toString();
    }

    function mockSearchPayload(query) {
      return {
        queryId: "mock_query",
        analysis: { steps: defaultAnalysisSteps(query), focusTags: ["身份周期", "现金流", "工作边界", "回流代价"] },
        paths: mockPaths,
        people: mockPeople
      };
    }

    async function postJson(path, payload) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), API_CONFIG.requestTimeoutMs);
      try {
        const response = await fetch(apiUrl(path), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function getJson(path) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), API_CONFIG.requestTimeoutMs);
      try {
        const response = await fetch(apiUrl(path), {
          method: "GET",
          headers: { "Accept": "application/json" },
          credentials: "include",
          signal: controller.signal
        });
        if (!response.ok) {
          const error = new Error(`HTTP ${response.status}`);
          error.status = response.status;
          throw error;
        }
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    function normalizeZhihuUser(payload) {
      const body = getResponseBody(payload) || {};
      const nestedUser = body.user || body.profile || body.me || {};
      const rawProfileUrl = body.profileUrl || nestedUser.profileUrl || body.profile_url || nestedUser.profile_url || body.homepage || nestedUser.homepage;
      const user = {
        ...nestedUser,
        id: body.id || nestedUser.id,
        name: body.name || nestedUser.name,
        avatar: body.avatar || nestedUser.avatar,
        profileUrl: normalizeProfileUrl(rawProfileUrl),
        userInfoLoaded: body.userInfoLoaded ?? nestedUser.userInfoLoaded,
        isTemporary: body.isTemporary ?? nestedUser.isTemporary
      };
      const loggedIn = body.loggedIn ?? body.authenticated ?? body.isLoggedIn ?? payload?.success ?? Boolean(user?.id || user?.name || user?.avatar);
      if (!loggedIn) return null;
      const userInfoLoaded = user.userInfoLoaded !== false;
      const isTemporary = Boolean(user.isTemporary) || !userInfoLoaded;
      return {
        id: textOf(user.id || user.userId || user.uid || "zhihu-authorized-user"),
        name: textOf(user.name || user.username || user.displayName || user.nickname || (isTemporary ? "知乎已授权" : "知乎用户")),
        avatar: textOf(user.avatar || user.avatarUrl || user.avatar_url),
        profileUrl: user.profileUrl,
        userInfoLoaded,
        isTemporary
      };
    }

    function normalizeProfileUrl(value) {
      const raw = textOf(value).trim();
      if (!raw) return "";
      try {
        const url = new URL(raw);
        const host = url.hostname.toLowerCase();
        const isZhihuWebHost = host === "zhihu.com" || host.endsWith(".zhihu.com");
        const isOpenApiHost = host === "openapi.zhihu.com";
        return isZhihuWebHost && !isOpenApiHost && url.pathname.startsWith("/people/") ? url.toString() : "";
      } catch {
        return "";
      }
    }

    function applyUser(user, source = "real") {
      state.user = user || mockZhihuUser;
      state.loggedIn = true;
      state.sessionChecked = true;
      state.authSource = source;
    }

    function redirectToZhihuLogin() {
      window.location.href = API_CONFIG.loginUrl;
    }

    async function checkSession() {
      state.sessionChecked = false;
      render();
      try {
        const payload = await getJson(API_CONFIG.meEndpoint);
        const user = normalizeZhihuUser(payload);
        if (user) {
          applyUser(user, "real");
          return true;
        }
        redirectToZhihuLogin();
        return false;
      } catch (error) {
        if (error?.status === 401 || error?.status === 403) {
          redirectToZhihuLogin();
          return false;
        }
        console.warn("Zhihu session API unavailable, using mock user fallback.", error);
        if (API_CONFIG.useMockUserFallback) {
          applyUser(mockZhihuUser, "mock");
          return true;
        }
        redirectToZhihuLogin();
        return false;
      }
    }

    function applySearchData(data, query) {
      people = data.people;
      paths = sortPathsByCount(data.paths.length ? data.paths : buildPathsFromPeople(people));
      state.queryId = data.queryId || null;
      state.analysisSteps = data.analysisSteps.length ? data.analysisSteps : defaultAnalysisSteps(query);
      state.focusTags = data.focusTags.length ? data.focusTags : ["身份周期", "现金流", "工作边界", "回流代价"];
      state.selectedPathId = paths[0]?.id || "";
      state.selectedPersonId = "";
      state.pathExpanded = false;
      state.skipPathShowcase = false;
      state.singlePersonMode = false;
      state.readerOpen = false;
      state.askPanelOpen = false;
      state.readerArticleIndex = 0;
    }

    function routeAfterSearchData() {
      if (!people.length) {
        state.selectedPathId = "";
        state.selectedPersonId = "";
        state.pathExpanded = false;
        state.skipPathShowcase = false;
        state.singlePersonMode = false;
        setPage("empty");
        return;
      }

      if (people.length === 1) {
        state.selectedPathId = people[0]?.pathId || paths[0]?.id || "";
        state.pathExpanded = true;
        state.skipPathShowcase = true;
        state.singlePersonMode = true;
        state.selectedPersonId = people[0].id;
        setPage("paths");
        return;
      }

      if (paths.length <= 1) {
        state.selectedPathId = paths[0]?.id || people[0]?.pathId || "";
        state.pathExpanded = true;
        state.skipPathShowcase = true;
        state.singlePersonMode = false;
        state.selectedPersonId = "";
        setPage("paths");
        return;
      }

      state.selectedPathId = paths[0]?.id || "";
      state.selectedPersonId = "";
      state.pathExpanded = false;
      state.skipPathShowcase = false;
      state.singlePersonMode = false;
      setPage("paths");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function refTitle(ref, index = 0) {
      if (typeof ref === "string") return ref;
      return textOf(ref.title || ref.name || ref.label || ref.id || `来源 ${index + 1}`);
    }

    function renderInlineSourceRefs(sourceRefs = []) {
      const refs = normalizeSourceRefs(sourceRefs);
      if (!refs.length) return "";
      return refs.map((ref, index) => {
        if (typeof ref === "string") return `<span>${escapeHtml(ref)}</span>`;
        const title = refTitle(ref, index);
        return ref.url ? `<a href="${escapeHtml(ref.url)}" target="_blank" rel="noreferrer">${escapeHtml(title)}</a>` : `<span>${escapeHtml(title)}</span>`;
      }).join("、");
    }

    function renderSourceLine(sourceRefs = [], label = "来源") {
      const content = renderInlineSourceRefs(sourceRefs);
      return content ? `<p class="source-line">${label}：${content}</p>` : "";
    }

    function renderDataChips(items = []) {
      return toArray(items).filter(Boolean).map((item) => `<span class="data-chip">${escapeHtml(item)}</span>`).join("");
    }

    function formatScore(value) {
      const score = Number(value);
      if (!Number.isFinite(score)) return "";
      return score <= 1 ? `${Math.round(score * 100)}%` : `${Math.round(score)}%`;
    }

    function getPath(id = state.selectedPathId) {
      return paths.find((item) => item.id === id) || paths[0] || normalizePath({ name: "未知路径" });
    }

    function getPerson(id = state.selectedPersonId) {
      return people.find((item) => item.id === id) || people[0] || normalizePerson({ name: "知乎用户" });
    }

    function getProfileUrl(person) {
      return person.raw?.profileUrl || person.raw?.profile_url || person.raw?.zhihuUrl || person.raw?.zhihu_url || person.raw?.homepage || person.raw?.url || `https://www.zhihu.com/people/${encodeURIComponent(person.id || person.name)}`;
    }

    function getPersonaReply(person) {
      return person.lesson || person.oneLine || "我能分享的最重要经验，是先把现金流、身份周期和真实生活节奏想清楚。";
    }

    function personaName(person) {
      return `${personDisplayName(person)}的分身`;
    }

    function personDisplayName(person) {
      const raw = textOf(person?.name || "").trim();
      const cleaned = cleanGeneratedSampleLabel(raw).replace(/\s+/g, " ").trim();
      return cleaned && !/^\d+$/.test(cleaned) ? cleaned : "知乎用户";
    }

    function peopleForPath(pathId = state.selectedPathId) {
      const path = paths.find((item) => item.id === pathId);
      const personRefs = new Set(toArray(path?.personRefs).map(String));
      return people.filter((person) => person.pathId === pathId || personRefs.has(person.id));
    }

    function setPage(page) {
      clearLoadingTimers();
      if (page !== "chat") {
        clearChatReplyTimer();
        state.aiTyping = false;
      }
      if (page !== "samples") {
        state.readerOpen = false;
        state.askPanelOpen = false;
        state.readerArticleIndex = 0;
      }
      state.page = page;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearLoadingTimers() {
      loadingTimers.forEach((timer) => clearTimeout(timer));
      loadingTimers = [];
    }

    function clearChatReplyTimer() {
      if (chatReplyTimer) clearTimeout(chatReplyTimer);
      chatReplyTimer = null;
    }

    function schedulePersonaReply(person, delay = 1600) {
      clearChatReplyTimer();
      state.aiTyping = true;
      chatReplyTimer = setTimeout(() => {
        state.aiTyping = false;
        state.messages.push({ role: "ai", text: getPersonaReply(person) });
        chatReplyTimer = null;
        if (state.page === "chat") render();
      }, delay);
    }

    function render() {
      clearSpotlightTimer();
      clearHomePromptTimer();
      document.body.dataset.page = state.page;
      const views = {
        home: renderHome,
        loading: renderLoading,
        paths: renderPaths,
        samples: renderSamples,
        chat: renderChat,
        library: renderLibrary,
        community: renderCommunityDraft,
        empty: renderEmptyResults
      };
      app.innerHTML = (views[state.page] || renderHome)();
      updateTopbar();
      bindEvents();
      setupSpotlight();
      setupHomePromptRotation();
    }

    function clearSpotlightTimer() {
      if (spotlightTimer) clearInterval(spotlightTimer);
      spotlightTimer = null;
    }

    function clearHomePromptTimer() {
      if (homePromptTimer) clearInterval(homePromptTimer);
      homePromptTimer = null;
    }

    function setupHomePromptRotation() {
      if (state.page !== "home" || state.homeInputTouched) return;
      homePromptTimer = setInterval(() => {
        const input = document.getElementById("questionInput");
        const placeholder = document.getElementById("queryPlaceholder");
        if (!input || !placeholder || input.value.trim() || state.homeInputTouched) return;
        state.promptIndex = (state.promptIndex + 1) % queryPrompts.length;
        const next = queryPrompts[state.promptIndex];
        input.dataset.prompt = next;
        placeholder.textContent = next;
      }, 2600);

    function setupSpotlight() {
      if (state.page !== "samples" && !(state.page === "paths" && state.pathExpanded)) return;
      const update = () => {
        const stage = document.querySelector(".sample-stage");
        if (!stage) return;
        const rect = stage.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const radius = rect.width * 0.14;
        document.querySelectorAll(".sample-person").forEach((node) => {
          const personRect = node.getBoundingClientRect();
          const personCenter = personRect.left + personRect.width / 2;
          node.classList.toggle("is-spotlight", Math.abs(personCenter - center) < radius);
        });
      };
      update();
      spotlightTimer = setInterval(update, 180);
    }

        const h = Math.round((170 + (index % 4) * 22) * scale);
        return `
          <div class="walker" style="--w:${w}px;--h:${h}px;--delay:${(index % 8) * -0.25}s">
            <img src="${peepSrc(peepId)}" alt="">

      return `
        <div class="crowd-stage" aria-hidden="true">
          <div class="crowd-row" style="--bottom:-18px;--gap:18px;--opacity:1;--blur:0px;--speed:38s">${makeRow(22, 1.16, 0)}${makeRow(22, 1.16, 1)}</div>

          <div class="crowd-row" style="--bottom:88px;--gap:34px;--opacity:.36;--blur:5px;--speed:70s">${makeRow(16, .68, 1)}${makeRow(16, .68, 0)}</div>

    async function requestSearchData(query) {
      state.backendStatus = "loading";
      try {
        const payload = await postJson(API_CONFIG.demoSearchEndpoint, { query, count: 5, dataMode: state.dataMode });
        const body = getResponseBody(payload) || {};
        const explicitFailure = payload?.success === false || body?.success === false;
        const data = normalizeSearchResponse(payload, query);
        state.backendStatus = explicitFailure ? "mock" : "ready";
        return data;
      } catch (error) {
        console.warn("Search API unavailable, using mock fallback.", error);
        state.backendStatus = "mock";
        if (!API_CONFIG.useMockFallback) throw error;
        return normalizeSearchResponse(mockSearchPayload(query), query);
      }
    }

    async function startLoading() {
      state.loadingStep = 0;
      state.analysisSteps = defaultAnalysisSteps(state.question);
      state.focusTags = ["身份周期", "现金流", "工作边界", "回流代价"];
      setPage("loading");
      clearLoadingTimers();
      const searchPromise = requestSearchData(state.question);
      searchPromise.then((data) => {
        state.analysisSteps = data.analysisSteps.length ? data.analysisSteps : defaultAnalysisSteps(state.question);
        state.focusTags = data.focusTags.length ? data.focusTags : state.focusTags;
        if (state.page === "loading") render();
      }).catch(() => {});
      const minimumLoading = new Promise((resolve) => setTimeout(resolve, 4300));
      [1, 2, 3, 4].forEach((step, index) => {
        loadingTimers.push(setTimeout(() => {
          state.loadingStep = step;
          if (state.page === "loading") updateLoadingSteps();
        }, 850 * (index + 1)));
      });
      const [searchData] = await Promise.all([searchPromise, minimumLoading]);
      clearLoadingTimers();
      applySearchData(searchData, state.question);
      routeAfterSearchData();
    }

      document.querySelectorAll(".fingerprint-step").forEach((node, index) => {

      const roleClass = msg.role === "user" ? "user" : "ai";
      return `
        <div class="message ${roleClass}">
          ${escapeHtml(msg.text)}
        </div>
      `;
    }

    function renderSourceRef(ref, index = 0) {
      if (typeof ref === "string") return `<span>${escapeHtml(ref)}</span>`;
      const title = textOf(ref.title || ref.name || ref.label || ref.id || `来源 ${index + 1}`);
      const url = textOf(ref.url || ref.sourceUrl || ref.source_url || ref.link || "");
      const label = [ref.sourceName || ref.source_name || ref.type, ref.publishedAt || ref.published_at].filter(Boolean).join(" · ");
      const content = `${url ? `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(title)}</a>` : `<span>${escapeHtml(title)}</span>`}${label ? `<span>${escapeHtml(label)}</span>` : ""}`;
      return `<span>${content}</span>`;
    }

    function renderLibrary() {
      const groups = state.savedQuestionGroups
        .map((group) => ({
          ...group,
          people: toArray(group.personIds).map((id) => people.find((person) => person.id === id)).filter(Boolean)
        }))
        .filter((group) => group.people.length);
      return `
        <section class="screen">
          <div class="paths-copy">
            <h1>我的样本库</h1>
          </div>
          <div class="library-grid">
            ${groups.length ? groups.map(renderLibraryQuestionGroup).join("") : renderLibraryEmptyState()}
          </div>
        </section>
      `;
    }

    function renderLibraryQuestionGroup(group) {
      return `
        <section class="library-group-card">
          <div class="library-group-head">
            <div class="library-group-title">
              <h2>${escapeHtml(group.question || "未命名问题")}</h2>
              <span class="library-count-pill">已存${group.people.length}个样本</span>
            </div>
          </div>
          <div class="library-sample-list">
            ${group.people.map(renderSavedSampleCard).join("")}
          </div>
        </section>
      `;
    }

    function renderSavedSampleCard(person) {
      return `
        <article class="saved-card">
          <div class="mini-peep-card"><img src="${avatarSrc(person.avatar)}" alt=""></div>
          <div>
            <a class="person-name-link" href="${escapeHtml(getProfileUrl(person))}" target="_blank" rel="noreferrer">${escapeHtml(personDisplayName(person))}</a>
            <p style="color:var(--faint);margin-top:4px">路径：${escapeHtml(getPath(person.pathId).name)}</p>
            <p style="color:var(--muted);margin-top:6px;line-height:1.6">${escapeHtml(person.oneLine)}</p>
          </div>
          <div class="library-row-actions">
            <button class="secondary" type="button" data-action="open-saved" data-id="${escapeHtml(person.id)}">回看 TA 的经历</button>
            <button class="text-button" type="button" data-action="open-saved-chat" data-id="${escapeHtml(person.id)}">继续问 AI 分身</button>
          </div>
        </article>
      `;
    }

    function renderLibraryEmptyState() {
      return `
        <article class="library-empty">
          <h2>你还没有保存样本</h2>
          <p>当你遇到一个想继续参考的人，可以把 TA 收进这里。</p>
          <button class="secondary" type="button" data-action="go-find-samples">去寻找走过的人</button>
        </article>
      `;
    }

    function defaultCommunityDraftBody() {
      return `最近我一直在想一个问题：如果不工作了，我是不是可以去新西兰生活一段时间。

我不是单纯想旅游，也不是已经决定移民。更像是现在对工作和生活状态都有点疲惫，想知道换一个地方之后，自己会不会真的变好。

刚刚看了一些前人的经历，发现有的人先去一年试生活，有的人通过留学转工签留下来，也有人去了之后发现自己只是需要暂停，最后又回来了。

所以想问问真正走过类似路的人：

1. 你当时为什么想去新西兰？
2. 去了之后，最先被现实打破的想象是什么？
3. 如果只是因为职业倦怠，去新西兰生活真的有帮助吗？
4. 出发前最应该先想清楚什么？

希望听到一些真实经历，不需要鸡汤，也不需要攻略。`;
    }

    function renderCommunityDraft() {
      return `
        <section class="screen">
          <div class="draft-layout">
            <section class="draft-card">
              <label for="communityTitle">标题</label>
              <input class="draft-title-input" id="communityTitle" value="不工作之后想去新西兰生活，怎么判断自己是真的适合，还是只是想逃离现在？">
              <label for="communityBody" style="margin-top:18px">正文</label>
              <textarea class="draft-body-input" id="communityBody">${escapeHtml(defaultCommunityDraftBody())}</textarea>
              <div class="action-row" style="justify-content:flex-start">
                <button class="primary zhihu-button" type="button" data-action="publish-community">发布</button>
                <button class="secondary dark" type="button" data-action="save-community">返回样本库</button>
              </div>
            </section>
          </div>
        </section>
      `;
    }

    function openReader(articleIndex) {
      state.readerArticleIndex = articleIndex;
      state.readerOpen = true;
      state.askPanelOpen = false;
      if (state.singlePersonMode && state.page === "paths") {
        render();
        return;
      }
      if (state.page === "paths" && state.pathExpanded) {
        syncSampleView();
        return;
      }
      if (state.page !== "samples") {
        setPage("samples");
        return;
      }
      syncSampleView();
    }

    function closeReader() {
      state.readerOpen = false;
      state.readerArticleIndex = 0;
      if (state.singlePersonMode && state.page === "paths") {
        render();
        return;
      }
      syncSampleView();
    }

    function openAskPanel(person = getPerson()) {
      const editable = document.getElementById("inlineAskText");
      state.questionText = editable ? (editable.value.trim() || state.questionText) : buildQuestionText(person);
      state.readerOpen = false;
      state.askPanelOpen = true;
      state.readerArticleIndex = 0;
      if (state.singlePersonMode && state.page === "paths") {
        render();
        return;
      }
      if (state.page === "paths" && state.pathExpanded) {
        syncSampleView();
        return;
      }
      if (state.page !== "samples") {
        setPage("samples");
        return;
      }
      syncSampleView();
    }

    function closeAskPanel() {
      const editable = document.getElementById("inlineAskText");
      if (editable) state.questionText = editable.value.trim() || state.questionText;
      state.askPanelOpen = false;
      if (state.singlePersonMode && state.page === "paths") {
        render();
        return;
      }
      syncSampleView();
    }

    function selectPerson(id) {
      state.selectedPersonId = id;
      state.readerArticleIndex = 0;
      state.readerOpen = false;
      state.askPanelOpen = false;
      if (state.singlePersonMode && state.page === "paths") {
        render();
        return;
      }
      if (state.page === "samples" || (state.page === "paths" && state.pathExpanded)) {
        syncSampleView();
        return;
      }
      render();
    }

    function syncSampleView() {
      if (state.singlePersonMode && state.page === "paths") {
        render();
        return;
      }
      const stage = document.querySelector(".sample-stage");
      if (!stage) return;
      stage.outerHTML = renderSampleStage();
      bindEvents();
    }

    function currentLibraryQuestion() {
      return state.hasSubmittedQuestion && state.submittedQuestion ? state.submittedQuestion : state.question;
    }

    function getOrCreateSavedQuestionGroup() {
      const query = currentLibraryQuestion();
      const queryId = state.queryId || "";
      let group = state.savedQuestionGroups.find((item) => (queryId && item.queryId === queryId) || item.question === query);
      if (!group) {
        group = {
          id: queryId || `local_${Date.now()}`,
          queryId,
          question: query,
          personIds: []
        };
        state.savedQuestionGroups.unshift(group);
      }
      return group;
    }

    function savePerson() {
      const id = state.selectedPersonId;
      const person = getPerson(id);
      const saveId = id || person.id;
      const group = getOrCreateSavedQuestionGroup();
      if (saveId && !group.personIds.includes(saveId)) group.personIds.push(saveId);
      if (!window.LIFE_PATH_FORCE_MOCK) {
        postJson(API_CONFIG.saveEndpoint, { queryId: group.queryId || state.queryId, query: group.question, personId: saveId }).catch(() => {});
      }
      const el = document.createElement("div");
      el.className = "save-animation";
      el.innerHTML = `<img src="${avatarSrc(person.avatar)}" alt="">`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
      const libraryButton = document.querySelector('[data-action="library"]');
      if (libraryButton) {
        libraryButton.classList.add("is-bouncing");
        setTimeout(() => libraryButton.classList.remove("is-bouncing"), 700);
      }
      showToast("已存入我的样本库");
    }

    function showToast(text) {
      toastRoot.innerHTML = `<div class="toast">${text}</div>`;
      setTimeout(() => { toastRoot.innerHTML = ""; }, 2400);
    }

    function readEditableQuestion() {
      const editable = document.getElementById("inlineAskText");
      if (!editable) return state.questionText;
      return "value" in editable ? editable.value : editable.innerText;
    }

    async function addChat(text) {
      if (!text.trim() || state.aiTyping) return;
      const person = getPerson();
      const history = chatHistoryMessages(state.messages);
      state.messages.push({ role: "user", text });
      state.aiTyping = true;
      render();
      try {
        await new Promise((resolve) => setTimeout(resolve, 850));
        const response = await postJson(API_CONFIG.chatEndpoint, {
          personaId: person.personaId || person.id,
          queryId: state.queryId,
          message: text,
          history
        });
        const data = normalizeChatResponse(response);
        state.messages.push({
          role: "ai",
          text: data.reply || getPersonaReply(person)
        });
      } catch (error) {
        console.warn("Persona chat API unavailable, using mock fallback.", error);
        const data = fallbackChatPayload(person);
        state.messages.push({
          role: "ai",
          text: data.reply
        });
      }
      state.aiTyping = false;
      render();
    }

    function bindEvents() {
      const homeInput = document.getElementById("questionInput");
      if (homeInput && homeInput.dataset.boundInput !== "true") {
        const card = homeInput.closest(".question-card");
        const updateInputState = () => {
          card?.classList.toggle("has-value", Boolean(homeInput.value.trim()));
        };
        homeInput.dataset.boundInput = "true";
        homeInput.addEventListener("focus", () => {
          state.homeInputTouched = true;
          card?.classList.add("is-editing");
        });
        homeInput.addEventListener("input", updateInputState);
        updateInputState();
      }
      document.querySelectorAll(".sample-person[data-action='select-person']").forEach((node) => {
        if (node.dataset.pointerBound === "true") return;
        node.dataset.pointerBound = "true";
        node.addEventListener("pointerdown", () => selectPerson(node.dataset.id));
      });
      document.querySelectorAll("[data-action]").forEach((node) => {
        if (node.dataset.bound === "true") return;
        node.dataset.bound = "true";
        node.addEventListener("click", (event) => {
          const target = event.target.closest("[data-action]");
          if (!target) return;
          const action = target.dataset.action;
          event.preventDefault();
          if (action === "home") setPage("home");
          if (action === "profile") {
            const user = state.user || mockZhihuUser;
            if (user.profileUrl) {
              window.open(user.profileUrl, "_blank", "noopener");
            } else {
              showToast("知乎已授权，但用户资料接口暂未返回个人主页。");
            }
          }
          if (action === "paths") setPage("paths");
          if (action === "library") setPage("library");
          if (action === "samples") {
            if (state.pathExpanded) setPage("paths");
            else setPage("samples");
          }
          if (action === "community") setPage("community");
          if (action === "start") {
            const input = document.getElementById("questionInput");
            const activePrompt = input?.dataset.prompt || queryPrompts[state.promptIndex % queryPrompts.length];
            state.question = input ? input.value.trim() || activePrompt : activePrompt;
            state.hasSubmittedQuestion = true;
            state.submittedQuestion = state.question;
            state.homeInputTouched = false;
            startLoading();
          }
          if (action === "choose-path") {
            const card = target.closest(".path-card");
            const showcase = card?.closest(".path-showcase");
            state.selectedPathId = target.dataset.id;
            state.pathExpanded = true;
            state.skipPathShowcase = false;
            state.singlePersonMode = false;
            state.selectedPersonId = "";
            state.readerOpen = false;
            state.askPanelOpen = false;
            state.readerArticleIndex = 0;
            if (card && showcase) {
              card.classList.add("is-selected");
              showcase.classList.add("is-transitioning");
              window.setTimeout(() => {
                render();
                requestAnimationFrame(() => {
                  document.getElementById("expandedPathSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
                });
              }, 170);
            } else {
              render();
              requestAnimationFrame(() => {
                document.getElementById("expandedPathSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
              });
            }
          }
          if (action === "select-person") {
            selectPerson(target.dataset.id);
          }
          if (action === "refine-question") {
            state.homeInputTouched = true;
            setPage("home");
          }
          if (action === "continue-people") {
            state.selectedPersonId = "";
            state.readerOpen = false;
            state.askPanelOpen = false;
            syncSampleView();
          }
          if (action === "open-reader") openReader(Number(target.dataset.index || 0));
          if (action === "close-reader") closeReader();
          if (action === "ask-person" || action === "question-from-reader") {
            openAskPanel(getPerson());
          }
          if (action === "chat-from-inline-ask") {
            state.questionText = readEditableQuestion().trim() || state.questionText;
            const firstMessage = state.questionText;
            state.messages = [];
            setPage("chat");
            addChat(firstMessage);
          }
          if (action === "mock-dm-from-inline-ask") {
            state.questionText = readEditableQuestion().trim() || state.questionText;
            showToast("Demo 不发送真实私信。正式版会等待 TA 愿意接收提问。");
          }
          if (action === "close-inline-ask") closeAskPanel();
          if (action === "quick-chat") addChat(target.dataset.text || "");
          if (action === "send-chat") {
            const input = document.getElementById("chatInput");
            addChat(input ? input.value : "");
          }
          if (action === "save-person") savePerson();
          if (action === "open-saved") {
            state.selectedPersonId = target.dataset.id;
            state.selectedPathId = getPerson(state.selectedPersonId).pathId;
            state.singlePersonMode = people.length === 1;
            state.pathExpanded = state.singlePersonMode || state.pathExpanded;
            state.readerOpen = false;
            state.askPanelOpen = false;
            state.readerArticleIndex = 0;
            setPage(state.singlePersonMode ? "paths" : "samples");
          }
          if (action === "open-saved-chat") {
            state.selectedPersonId = target.dataset.id;
            state.selectedPathId = getPerson(state.selectedPersonId).pathId;
            state.singlePersonMode = people.length === 1;
            state.messages = [];
            setPage("chat");
          }
          if (action === "go-find-samples") {
            setPage(state.hasSubmittedQuestion ? "paths" : "home");
          }
          if (action === "publish-community") {
            if (!state.loggedIn) {
              redirectToZhihuLogin();
            } else {
              showToast("Demo 不会真实发布。正式版会打开知乎圈子编辑器。");
            }
          }
          if (action === "save-community") {
            if (state.pathExpanded) setPage("paths");
            else setPage("samples");
          }
        });
      });
    }

    async function bootstrap() {
      const ok = await checkSession();
      if (ok) render();
    }

    bootstrap();
  </script>
</body>
</html>
