<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生样本库 Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f5;
      --panel: #ffffff;
      --text: #1f2623;
      --muted: #65706b;
      --line: #d7e2e3;
      --accent: #1772f6;
      --accent-2: #3f8a71;
      --warn: #9b6a14;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(120deg, rgba(23, 114, 246, 0.1), transparent 34%),
        linear-gradient(180deg, #f8fbfc 0%, var(--bg) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: end;
      padding: 26px 0 32px;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: clamp(38px, 7vw, 72px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .lede {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .status-grid,
    .results {
      display: grid;
      gap: 14px;
    }

    .status-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .tile,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 54px rgba(40, 50, 45, 0.08);
    }

    .tile {
      padding: 18px;
    }

    .tile span,
    label,
    .eyebrow {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .tile strong {
      display: block;
      margin-top: 8px;
      font-size: 22px;
    }

    .panel {
      padding: 22px;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.82fr) minmax(0, 1.18fr);
      gap: 18px;
      align-items: start;
    }

    form {
      display: grid;
      gap: 14px;
    }

    textarea,
    select,
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 136px;
      resize: vertical;
      padding: 14px;
      line-height: 1.6;
    }

    select,
    input {
      min-height: 42px;
      padding: 0 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 108px;
      gap: 12px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--accent);
      border: 1px solid rgba(23, 114, 246, 0.24);
      background: #fff;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .notice {
      min-height: 24px;
      color: var(--warn);
      font-size: 14px;
      line-height: 1.6;
    }

    .result-card {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .result-card strong {
      font-size: 18px;
    }

    .result-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .chat {
      display: none;
      gap: 12px;
      margin-top: 14px;
    }

    .chat.is-visible {
      display: grid;
    }

    pre {
      max-height: 260px;
      overflow: auto;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111814;
      color: #d5f7de;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 24px, 640px);
        padding: 22px 0;
      }

      header,
      .demo-grid,
      .status-grid,
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <span class="eyebrow">Zhihu Hackathon Demo</span>
        <h1>人生样本库</h1>
        <p class="lede">输入一个真实困境，后端会用可追溯的公开内容样本生成路径、人群卡片和经验回声入口。</p>
      </div>
      <div class="status-grid" aria-live="polite">
        <div class="tile">
          <span>Health</span>
          <strong id="healthStatus">checking</strong>
        </div>
        <div class="tile">
          <span>Mode</span>
          <strong>mock ready</strong>
        </div>
      </div>
    </header>

    <section class="demo-grid">
      <div class="panel">
        <form id="searchForm">
          <label for="queryInput">问题</label>
          <textarea id="queryInput" name="query">不工作了之后，我想换一种生活方式，可以从哪里开始？</textarea>
          <div class="row">
            <div>
              <label for="dataModeInput">数据模式</label>
              <select id="dataModeInput" name="dataMode">
                <option value="mock">mock</option>
                <option value="cache_first">cache_first</option>
                <option value="real">real</option>
              </select>
            </div>
            <div>
              <label for="countInput">数量</label>
              <input id="countInput" name="count" type="number" min="1" max="20" value="3" />
            </div>
          </div>
          <button id="searchButton" type="submit">生成样本</button>
          <p class="notice" id="notice"></p>
        </form>

        <div class="chat" id="chatPanel">
          <label for="chatInput">追问第一个经验回声</label>
          <textarea id="chatInput">如果我也想这样做，第一步要注意什么？</textarea>
          <button class="secondary" id="chatButton" type="button">发送追问</button>
        </div>
      </div>

      <div class="panel results">
        <div id="summary" class="result-card">
          <strong>等待输入</strong>
          <p>部署成功后，这里会展示 /api/demo/search 的路径和人物样本。</p>
        </div>
        <div id="cards" class="results"></div>
        <pre id="rawOutput">{}</pre>
      </div>
    </section>
  </main>

  <script>
    const state = {
      queryId: "",
      personaId: ""
    };

    const healthStatus = document.getElementById("healthStatus");
    const searchForm = document.getElementById("searchForm");
    const searchButton = document.getElementById("searchButton");
    const chatButton = document.getElementById("chatButton");
    const chatPanel = document.getElementById("chatPanel");
    const notice = document.getElementById("notice");
    const summary = document.getElementById("summary");
    const cards = document.getElementById("cards");
    const rawOutput = document.getElementById("rawOutput");

    checkHealth();

    searchForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      await runSearch();
    });

    chatButton.addEventListener("click", async () => {
      await runChat();
    });

    async function checkHealth() {
      try {
        const response = await fetch("/health");
        const body = await response.json();
        healthStatus.textContent = response.ok && body.status === "ok" ? "ok" : "check failed";
      } catch {
        healthStatus.textContent = "offline";
      }
    }

    async function runSearch() {
      setBusy(searchButton, true);
      notice.textContent = "";

      try {
        const formData = new FormData(searchForm);
        const response = await postJson("/api/demo/search", {
          query: String(formData.get("query") || ""),
          count: Number(formData.get("count") || 3),
          dataMode: String(formData.get("dataMode") || "mock")
        });

        assertSuccess(response);
        const data = response.body.data;
        state.queryId = data.queryId;
        state.personaId = data.personas?.[0]?.id || data.people?.[0]?.aiPersona?.personaId || "";
        renderSearch(data);
        rawOutput.textContent = JSON.stringify(response.body, null, 2);
        chatPanel.classList.toggle("is-visible", Boolean(state.personaId));
      } catch (error) {
        showError(error);
      } finally {
        setBusy(searchButton, false);
      }
    }

    async function runChat() {
      setBusy(chatButton, true);
      notice.textContent = "";

      try {
        const message = document.getElementById("chatInput").value;
        const response = await postJson("/api/personas/chat", {
          personaId: state.personaId,
          queryId: state.queryId,
          message
        });

        assertSuccess(response);
        const reply = response.body.data.reply;
        const card = document.createElement("div");
        card.className = "result-card";
        card.innerHTML = `<strong>经验回声</strong><p>${escapeHtml(reply)}</p>`;
        cards.prepend(card);
        rawOutput.textContent = JSON.stringify(response.body, null, 2);
      } catch (error) {
        showError(error);
      } finally {
        setBusy(chatButton, false);
      }
    }

    async function postJson(path, payload) {
      const response = await fetch(path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      return {
        status: response.status,
        body: await response.json()
      };
    }

    function renderSearch(data) {
      summary.innerHTML = `
        <strong>${escapeHtml(data.analysis?.summary || "已生成路径样本")}</strong>
        <p>${escapeHtml((data.analysis?.focusTags || []).slice(0, 5).join(" / "))}</p>
      `;
      cards.innerHTML = "";

      for (const path of data.paths || []) {
        const card = document.createElement("div");
        card.className = "result-card";
        card.innerHTML = `
          <strong>${escapeHtml(path.title)}</strong>
          <p>${escapeHtml(path.summary || path.whyRelevant || "")}</p>
        `;
        cards.append(card);
      }

      for (const person of data.people || []) {
        const card = document.createElement("div");
        card.className = "result-card";
        card.innerHTML = `
          <strong>${escapeHtml(person.name || "知乎用户")}</strong>
          <p>${escapeHtml(person.oneLine || person.fitReason || "")}</p>
        `;
        cards.append(card);
      }
    }

    function assertSuccess(response) {
      if (!response.body || response.body.success !== true) {
        const code = response.body?.error?.code || response.status;
        const message = response.body?.error?.message || "request failed";
        throw new Error(`${code}: ${message}`);
      }
    }

    function setBusy(button, busy) {
      if (!button.dataset.label) {
        button.dataset.label = button.textContent;
      }

      button.disabled = busy;
      button.textContent = busy ? "请求中..." : button.dataset.label;
    }

    function showError(error) {
      notice.textContent = error instanceof Error ? error.message : String(error);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
