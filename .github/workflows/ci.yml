name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "init/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Backend install, build, and test
        shell: bash
        run: |
          if [ -f backend/package.json ]; then
            cd backend
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build --if-present
            npm test --if-present
          else
            echo "backend/package.json not found; skipping backend checks."
          fi

      - name: Frontend install, build, and test
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build --if-present
            npm test --if-present
          else
            echo "frontend/package.json not found; skipping frontend checks."
          fi
