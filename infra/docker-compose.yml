name: zhihu-hackathon-demo

services:
  migrate:
    image: node:22-alpine
    working_dir: /workspace/backend
    command: sh -lc "npm install && npm run db:migrate"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://zhihu:zhihu@postgres:5432/zhihu_hackathon}
    volumes:
      - ..:/workspace
      - backend_node_modules:/workspace/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: node:22-alpine
    working_dir: /workspace/backend
    command: sh -lc "npm run dev"
    environment:
      HOST: 0.0.0.0
      PORT: ${BACKEND_PORT:-8000}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      ZHIHU_API_KEY: ${ZHIHU_API_KEY:-}
      ZH_ACCESS_SECRET: ${ZHIHU_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://zhihu:zhihu@postgres:5432/zhihu_hackathon}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AGENT_TASK_TTL_HOURS: ${AGENT_TASK_TTL_HOURS:-24}
      AGENT_QUEUE_NAME: ${AGENT_QUEUE_NAME:-agent-tasks}
      AGENT_LLM_ENABLED: ${AGENT_LLM_ENABLED:-false}
      AGENT_LLM_PROVIDER: ${AGENT_LLM_PROVIDER:-deepseek}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-}
      AGENT_LLM_TIMEOUT_MS: ${AGENT_LLM_TIMEOUT_MS:-90000}
      AGENT_LLM_RETRIES: ${AGENT_LLM_RETRIES:-1}
      AGENT_LLM_TEST_MODE: ${AGENT_LLM_TEST_MODE:-mock}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      KIMI_MODEL: ${KIMI_MODEL:-moonshot-v1-8k}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_JSON_MODE: ${DEEPSEEK_JSON_MODE:-true}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - ..:/workspace
      - backend_node_modules:/workspace/backend/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-worker:
    image: node:22-alpine
    working_dir: /workspace/backend
    command: sh -lc "npm run build && npm run agent:worker"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://zhihu:zhihu@postgres:5432/zhihu_hackathon}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AGENT_TASK_TTL_HOURS: ${AGENT_TASK_TTL_HOURS:-24}
      AGENT_QUEUE_NAME: ${AGENT_QUEUE_NAME:-agent-tasks}
      AGENT_LLM_ENABLED: ${AGENT_LLM_ENABLED:-false}
      AGENT_LLM_PROVIDER: ${AGENT_LLM_PROVIDER:-deepseek}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-}
      AGENT_LLM_TIMEOUT_MS: ${AGENT_LLM_TIMEOUT_MS:-90000}
      AGENT_LLM_RETRIES: ${AGENT_LLM_RETRIES:-1}
      AGENT_LLM_TEST_MODE: ${AGENT_LLM_TEST_MODE:-mock}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      KIMI_MODEL: ${KIMI_MODEL:-moonshot-v1-8k}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_JSON_MODE: ${DEEPSEEK_JSON_MODE:-true}
      ZHIHU_API_KEY: ${ZHIHU_API_KEY:-}
      ZH_ACCESS_SECRET: ${ZHIHU_API_KEY:-}
    volumes:
      - ..:/workspace
      - backend_node_modules:/workspace/backend/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhihu_hackathon}
      POSTGRES_USER: ${POSTGRES_USER:-zhihu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhihu}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-zhihu} -d $${POSTGRES_DB:-zhihu_hackathon}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  backend_node_modules:
  postgres_data:
